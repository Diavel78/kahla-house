name: Scanner — Seed Market

# Register a Polymarket market for tracking. Triggered manually from the
# Actions UI (github.com/…/actions -> Scanner — Seed Market -> Run workflow).
# Works from mobile — the form appears right in the GitHub UI.

on:
  workflow_dispatch:
    inputs:
      slug:
        description: "Polymarket slug (e.g. chiefs-beat-bills)"
        required: true
        type: string
      sport:
        description: "Sport (NFL, NBA, MLB, NHL, CBB, NCAAF, UFC)"
        required: true
        type: choice
        options: [NFL, NBA, MLB, NHL, CBB, NCAAF, UFC]
      event:
        description: "Event name (format: 'Away @ Home')"
        required: true
        type: string
      start:
        description: "Event start (ISO8601 UTC, e.g. 2026-04-20T23:30:00Z)"
        required: true
        type: string
      home_side:
        description: "Which Poly token = HOME team winning?"
        required: true
        default: "yes"
        type: choice
        options: [yes, no]

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: kahla-scanner

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: kahla-scanner/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Seed market
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          POLYMARKET_KEY_ID:    ${{ secrets.POLYMARKET_KEY_ID }}
          POLYMARKET_SECRET_KEY: ${{ secrets.POLYMARKET_SECRET_KEY }}
        run: |
          python -m scrapers.polymarket seed \
            --slug     "${{ inputs.slug }}" \
            --sport    "${{ inputs.sport }}" \
            --event    "${{ inputs.event }}" \
            --start    "${{ inputs.start }}" \
            --home-side "${{ inputs.home_side }}"
