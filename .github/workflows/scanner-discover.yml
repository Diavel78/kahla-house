name: Scanner — Discover Markets

# Pulls every active moneyline market for the selected sports from
# Polymarket's public gamma API, cross-references against ESPN to get
# canonical home/away, and seeds them into the scanner.
#
# Runs automatically inside scanner-poll.yml every 30 min; this manual
# workflow is for one-off backfills or different sport/day windows.

on:
  workflow_dispatch:
    inputs:
      sports:
        description: "Comma-separated sport keys"
        required: true
        default: "MLB,NBA,NHL"
        type: string
      days:
        description: "Days ahead to scan"
        required: true
        default: "3"
        type: string

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: kahla-scanner

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: kahla-scanner/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Discover
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python -m scrapers.discover \
            --sports "${{ inputs.sports }}" \
            --days   "${{ inputs.days }}"
