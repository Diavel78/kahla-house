name: Odds Ingest — Poll

# Kahla House odds ingest via Owls Insight.
#
# One Owls API call per sport returns odds from ~13 books (POLY, PIN, DK, FD,
# CIR, MGM, CAE, HR, NVG). Persists book_snapshots to Supabase, deduped:
# only writes when a (market, book, market_type, side)'s price/line changes.
# Powers the line-movement charts on the Odds Board.
#
# This used to also run divergence/Brier analytics — those have been retired.
# This workflow now only writes book_snapshots.
#
# Budget: 7 sports × 288 runs/day (every 5min) = ~2K requests/day. Owls
# MVP+ plan allows 300K/month — we use ~60K/month, well inside the limit.
#
# Required secrets:
#   OWLS_INSIGHT_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#
# Optional repo Variable:
#   SPORTS_ENABLED   (default: NFL,NBA,MLB,NHL,CBB,NCAAF,UFC)

on:
  schedule:
    # Primary trigger is an external cron-job.org job that fires
    # workflow_dispatch every 5 min (GitHub's native schedule reliably
    # drifts to 30-40 min actual cadence). This schedule: line stays as
    # a fallback — runs every 30 min so data still flows if cron-job.org
    # is down.
    - cron: "*/30 * * * *"
  workflow_dispatch:          # manual trigger + cron-job.org primary

concurrency:
  group: odds-ingest-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: kahla-scanner

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: kahla-scanner/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Ingest Owls odds (all sports)
        env:
          OWLS_INSIGHT_API_KEY: ${{ secrets.OWLS_INSIGHT_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # Hardcoded so it doesn't depend on a repo Variable. Edit here to
          # add/remove sports. Soccer + Tennis intentionally excluded.
          SPORTS_ENABLED: NFL,NBA,MLB,NHL,CBB,NCAAF,UFC
        run: python -m scrapers.owls
