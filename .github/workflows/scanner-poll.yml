name: Odds Ingest — Poll

# Kahla House odds ingest via The Odds API (v4).
#
# One API call per sport hits /v4/sports/{sport_key}/odds with markets=h2h,
# spreads,totals and regions=us. Persists book_snapshots to Supabase, deduped:
# only writes when a (market, book, market_type, side)'s price/line changes.
# Powers the line-movement charts and the Odds Board on thekahlahouse.com.
#
# Cost math (The Odds API charges credits = markets × regions per call):
#   3 markets × 1 region = 3 credits per call
#   7 sports × 4 calls/hour × 24h × 30 days = 20,160 calls/month
#   = 60,480 credits/month, fits in the $59 100K-credit tier
#
# Required GitHub repo secrets:
#   ODDS_API_KEY         — from the-odds-api.com (paid tier)
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#
# To add/remove sports: edit SPORTS_ENABLED below.

on:
  schedule:
    # Primary trigger is the external cron-job.org workflow_dispatch every
    # 15 min. GitHub's native schedule is the fallback at the same interval
    # (it drifts a bit but that's fine — both can fire and the dedup logic
    # in scrapers/odds_api.py prevents redundant Supabase writes).
    - cron: "*/15 * * * *"
  workflow_dispatch:          # manual trigger + cron-job.org primary

concurrency:
  group: odds-ingest-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: kahla-scanner

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: kahla-scanner/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Ingest odds (all sports)
        env:
          ODDS_API_KEY:         ${{ secrets.ODDS_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SPORTS_ENABLED:       NFL,NBA,MLB,NHL,CBB,NCAAF,UFC
        run: python -m scrapers.odds_api
