name: Odds Ingest — Poll

# Kahla House odds ingest via The Odds API (v4).
#
# One API call per sport hits /v4/sports/{sport_key}/odds with
#   markets=h2h,spreads,totals
#   regions=us,eu          ← EU is required for Pinnacle (it's not in US region)
# Persists book_snapshots to Supabase, deduped: only writes when a
# (market, book, market_type, side)'s price/line changes.
#
# Cost math (The Odds API charges credits = markets × regions per call):
#   3 markets × 2 regions = 6 credits per call
#   7 sports × 2 calls/hour × 24h × 30 days = 10,080 calls/month
#   = 60,480 credits/month, fits in the $59 100K-credit tier
#
# Required GitHub repo secrets:
#   ODDS_API_KEY         — from the-odds-api.com (paid tier)
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#   TELEGRAM_BOT_TOKEN   — optional; from @BotFather. Sharp/steam alerts
#   TELEGRAM_CHAT_ID     — optional; user id from /getUpdates.
#                          Both required to send alerts; if either is
#                          missing the alert step exits as a no-op.
#
# To add/remove sports: edit SPORTS_ENABLED below.

# Trigger: cron-job.org pings workflow_dispatch every 30 min. We used to
# also have a GitHub-native `*/30 * * * *` schedule as a backup, but with
# both running every 30 min the workflow was queueing back-to-back via the
# concurrency group — burning ~2x the Odds API credits for the same data.
# cron-job.org has been reliable; the "last odds update Nm ago" status on
# /odds will surface any cron failure within a refresh cycle.
on:
  workflow_dispatch:

concurrency:
  group: odds-ingest-poll
  # If cron-job.org ever retries or someone manually triggers while a run
  # is queued, cancel the older one. Each run is idempotent (dedup logic
  # in scrapers/odds_api.py) so a half-finished run getting killed loses
  # nothing — the next run picks up what was missed. This guarantees we
  # never run two ingests back-to-back and double the credit burn.
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: kahla-scanner

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: kahla-scanner/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Ingest odds (all sports)
        env:
          ODDS_API_KEY:         ${{ secrets.ODDS_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SPORTS_ENABLED:       NFL,NBA,MLB,NHL,CBB,NCAAF,UFC
        run: python -m scrapers.odds_api

      # Sharp/steam Telegram alerts. Runs after ingest so it sees fresh
      # snapshots. No-ops silently when TELEGRAM_BOT_TOKEN/CHAT_ID aren't
      # set, and `continue-on-error` means a flaky alert run never blocks
      # the next ingest cycle. Also logs steam paper bets (Phase 4).
      - name: Sharp + steam alerts (Telegram)
        continue-on-error: true
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m scripts.sharp_alerts

      # Phase 4 — Early + Late EV paper-bet pickers. Both ride this
      # same 30-min cron. Per-bot dedup means re-runs only fill new
      # candidates as games walk into each bot's window:
      #   early → games starting 12–18h out
      #   late  → games starting 0–2h out
      # continue-on-error so a flaky pick run never blocks the next
      # ingest cycle.
      - name: Paper bets — Early EV picker
        continue-on-error: true
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scripts.paper_bets_picker --bot early

      - name: Paper bets — Late EV picker
        continue-on-error: true
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scripts.paper_bets_picker --bot late
