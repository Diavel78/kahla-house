name: Scanner — Poll

# Kahla Scanner ingest via Owls Insight.
#
# One Owls API call per sport returns odds from ~13 books (POLY, PIN, DK, FD,
# CIR, MGM, CAE, HR, NVG), eliminating the need for direct sportsbook scrapes.
# Persists book_snapshots to Supabase. ESPN resolves finished games into
# market_outcomes hourly (piggybacked on the same workflow).
#
# Budget: 8 sports × 288 runs/day (every 5min) = ~2.3K requests/day. Owls
# MVP+ plan allows 300K/month — we use ~70K/month, well inside the limit.
#
# Required secrets:
#   OWLS_INSIGHT_API_KEY
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY
#
# Optional:
#   SPORTS_ENABLED   (default: NFL,NBA,MLB,NHL,CBB)
#   SCANNER_MODE     (default: log_only — keep until M0 Brier results)

on:
  schedule:
    # Primary trigger is an external cron-job.org job that fires
    # workflow_dispatch every 5 min (GitHub's native schedule reliably
    # drifts to 30-40 min actual cadence, which isn't fine-grained enough
    # for signal scanning). This schedule: line stays as a fallback —
    # runs every 30 min so data still flows if cron-job.org is down.
    - cron: "*/30 * * * *"
  workflow_dispatch:          # manual trigger + cron-job.org primary

concurrency:
  group: scanner-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: kahla-scanner

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: kahla-scanner/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Ingest Owls odds (all sports)
        env:
          OWLS_INSIGHT_API_KEY: ${{ secrets.OWLS_INSIGHT_API_KEY }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SPORTS_ENABLED:       ${{ vars.SPORTS_ENABLED || 'NFL,NBA,MLB,NHL,CBB' }}
          SCANNER_MODE:         ${{ vars.SCANNER_MODE || 'log_only' }}
        run: python -m scrapers.owls

      - name: Resolve finished games (ESPN)
        continue-on-error: true
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SPORTS_ENABLED:       ${{ vars.SPORTS_ENABLED || 'NFL,NBA,MLB,NHL,CBB' }}
        run: python -m analytics.resolve

      - name: Scan for sharp-consensus signals
        continue-on-error: true
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SPORTS_ENABLED:       ${{ vars.SPORTS_ENABLED || 'NFL,NBA,MLB,NHL,CBB' }}
          # Phase 1: signals write to Supabase `signals` table. No Telegram yet.
          # Thresholds (env-overridable):
          #   SHARP_CONSENSUS_AGREE_MAX_PCT  default 1.5  (POLY~PIN agreement)
          #   SHARP_CONSENSUS_EDGE_MIN_PCT   default 3.0  (sharp vs public)
          #   SHARP_CONSENSUS_LOOKAHEAD_HOURS default 2.0
          #   SHARP_CONSENSUS_DEDUP_MIN      default 30   (min gap between fires)
        run: python -m signals.divergence
