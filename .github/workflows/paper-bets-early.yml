name: Paper Bets — Early EV picker

# Phase 4 Sharp Bot — Early EV bot.
#
# Runs once per day to pick the top 5 +EV bets from games starting
# 10–36h out. Thesis: PIN (sharp) has moved off the opener overnight,
# but retail hasn't caught up yet — best window for cumulative edge.
#
# Triggered ONLY by cron-job.org workflow_dispatch — match the existing
# scanner-poll.yml pattern. Recommended cron-job.org schedule:
#   13:00 UTC  (= 8am ET during EDT, 9am ET during EST)
# Picker is idempotent: it skips markets already picked by the early
# bot in the last 7 days, so a manual re-trigger or a duplicate cron
# fire fills only new candidates.
#
# Required GitHub repo secrets (already present from scanner-poll.yml):
#   SUPABASE_URL
#   SUPABASE_SERVICE_KEY

on:
  workflow_dispatch:

concurrency:
  group: paper-bets-early
  cancel-in-progress: true

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: kahla-scanner

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: kahla-scanner/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Pick early EV bets
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python -m scripts.paper_bets_picker --bot early
