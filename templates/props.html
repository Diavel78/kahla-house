<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahla House — Player Props</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Firebase Auth (compat mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script>
        const FC = {
            apiKey: "AIzaSyDQbjlc7VIYmFjbhq119Cl1-JhuXwKq0fY",
            authDomain: "kahla-house.firebaseapp.com",
            projectId: "kahla-house",
            storageBucket: "kahla-house.firebasestorage.app",
            messagingSenderId: "1029771942929",
            appId: "1:1029771942929:web:76358096dbb868e375a5b0"
        };
        firebase.initializeApp(FC);
    </script>

    <style>
        :root {
            --bg: #0b0e13;
            --surface: #13171e;
            --surface-2: #1a1f2b;
            --surface-3: #1f2533;
            --border: #1e2530;
            --border-light: #2a3140;
            --text: #e2e8f0;
            --text-secondary: #8890a8;
            --text-muted: #555d78;
            --blue: #4a7cff;
            --blue-dim: rgba(74,124,255,0.08);
            --green: #22c55e;
            --green-dim: rgba(34,197,94,0.10);
            --orange: #f59e0b;
            --orange-dim: rgba(245,158,11,0.10);
            --red: #ef4444;
            --red-dim: rgba(239,68,68,0.10);
            --purple: #a855f7;
            --cyan: #06b6d4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(74,124,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74,124,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(74,124,255,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .top-bar-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .top-bar-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .nav-links {
            display: flex;
            gap: 4px;
            margin-left: 12px;
        }
        .nav-link {
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.15s;
        }
        .nav-link:hover {
            color: var(--text);
            background: var(--surface-2);
        }
        .nav-link.active {
            color: #fff;
            background: var(--blue);
        }
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            min-height: 16px;
            white-space: nowrap;
        }
        .status.loading { color: var(--orange); }
        .status.error { color: var(--red); }
        .logout-btn {
            padding: 6px 14px;
            background: var(--surface-2);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .logout-btn:hover {
            color: var(--text);
            background: var(--surface-3);
        }

        /* Auth loading */
        .auth-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-secondary);
            font-size: 14px;
            gap: 10px;
        }

        /* Sport bar */
        .sport-bar {
            display: flex;
            gap: 0;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            overflow-x: auto;
            position: relative;
            z-index: 5;
        }
        .stab {
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            transition: all 0.15s;
        }
        .stab:hover { color: var(--text-secondary); }
        .stab.active {
            color: var(--text);
            border-bottom-color: var(--blue);
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 10px;
            padding: 14px 24px;
            align-items: center;
            flex-wrap: wrap;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }
        .search-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 14px;
            color: var(--text);
            font-size: 13px;
            width: 260px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.15s;
        }
        .search-box:focus { border-color: var(--blue); }
        .search-box::placeholder { color: var(--text-muted); }
        .info {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto;
            white-space: nowrap;
        }

        /* Books button + dropdown */
        .books-btn-wrap { position: relative; }
        .books-btn {
            padding: 8px 14px;
            background: var(--surface);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }
        .books-btn:hover { background: var(--surface-2); }
        .books-btn .cnt {
            background: var(--blue);
            color: #fff;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
        }
        .books-panel {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            width: 260px;
            max-height: 420px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0,0,0,.5);
        }
        .books-panel.open { display: block; }
        .books-panel-header {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .books-panel-header span { font-size: 12px; font-weight: 700; color: var(--text); }
        .books-panel-header button {
            font-size: 10px;
            color: var(--blue);
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .book-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-bottom: 1px solid var(--surface-2);
            user-select: none;
            transition: background 0.1s;
        }
        .book-item:hover { background: var(--surface-2); }
        .book-item:last-child { border-bottom: none; }
        .book-item input[type=checkbox] { accent-color: var(--blue); width: 16px; height: 16px; cursor: pointer; }
        .book-item .book-label { flex: 1; font-size: 13px; color: var(--text); }
        .book-item .book-abbr { font-size: 10px; color: var(--text-muted); margin-left: 4px; }
        .book-item .move-btn {
            color: var(--text-muted);
            font-size: 16px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 3px;
            line-height: 1;
        }
        .book-item .move-btn:hover { color: var(--blue); }
        .active-books-summary { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
        .abs-chip {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--surface-2);
            padding: 2px 8px;
            border-radius: 6px;
        }

        /* Board */
        .board {
            max-width: 1400px;
            margin: 0 auto;
            padding: 8px 24px 40px;
            position: relative;
            z-index: 1;
        }

        /* Game card */
        .game {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }
        .game-header:hover { background: var(--surface-2); }
        .game-header .teams {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.2px;
        }
        .game-header .meta {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
        }
        .game-header .toggle {
            color: var(--text-muted);
            font-size: 14px;
            transition: transform 0.2s;
        }
        .game-header .toggle.open { transform: rotate(180deg); }

        /* Props table */
        .props-body { display: none; }
        .props-body.open { display: block; }
        .ptable { width: 100%; border-collapse: collapse; }
        .ptable th {
            background: var(--bg);
            padding: 8px 14px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-align: left;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
        }
        .ptable th.center { text-align: center; }
        .ptable td {
            padding: 8px 14px;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        .ptable tr:hover { background: var(--surface-2); }
        .player-name {
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            letter-spacing: -0.2px;
        }
        .prop-label {
            color: var(--text-secondary);
            font-size: 12px;
        }
        .prop-point {
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 13px;
        }
        .best-price {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 14px;
            text-align: center;
        }
        .best-price.pos { color: var(--green); }
        .best-price.neg { color: var(--text); }
        .best-price.na { color: var(--text-muted); }
        .best-book {
            display: block;
            font-size: 9px;
            font-weight: 600;
            color: var(--blue);
            margin-top: 2px;
            text-align: center;
        }

        /* Expanded row — all books */
        .books-detail { display: none; background: var(--bg); }
        .books-detail.open { display: table-row; }
        .books-detail td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
        .books-grid { display: flex; gap: 8px; flex-wrap: wrap; }
        .book-chip {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            min-width: 72px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }
        .book-chip .bname {
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .book-chip .bover { color: var(--green); font-weight: 600; }
        .book-chip .bunder { color: var(--red); font-weight: 600; }
        .book-chip .bna { color: var(--text-muted); }
        .book-chip a { color: inherit; text-decoration: none; }
        .book-chip a:hover { text-decoration: underline; color: var(--blue); }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-muted);
            font-size: 14px;
        }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media(max-width:768px) {
            .top-bar { padding: 0 12px; height: 48px; }
            .top-bar-title { display: none; }
            .nav-links { margin-left: 8px; }
            .nav-link { font-size: 12px; padding: 5px 10px; }
            .toolbar { padding: 10px 12px; }
            .search-box { width: 180px; }
            .board { padding: 0 12px 40px; }
            .sport-bar { padding: 0 12px; }
            .stab { padding: 8px 12px; font-size: 12px; }
            .ptable th, .ptable td { padding: 6px 8px; font-size: 12px; }
            .best-price { font-size: 12px; }
            .books-grid { gap: 4px; }
            .book-chip { min-width: 56px; padding: 6px 8px; }
        }
    </style>
</head>
<body>
    <!-- Auth loading state -->
    <div class="auth-loading" id="auth-gate">
        <span class="spinner"></span> Authenticating...
    </div>

    <!-- Main app (hidden until auth) -->
    <div id="app" style="display:none">
        <div class="top-bar">
            <div class="top-bar-left">
                <div class="top-bar-logo">KH</div>
                <div class="top-bar-title">The Kahla House</div>
                <div class="nav-links">
                    <a href="/" class="nav-link">Home</a>
                    <a href="/odds" class="nav-link">Odds</a>
                    <a href="/props" class="nav-link active">Props</a>
                    <a href="/dashboard" class="nav-link">Dashboard</a>
                    <a href="/scanner" class="nav-link">Scanner</a>
                </div>
            </div>
            <div class="top-bar-right">
                <span class="status" id="status">Loading...</span>
                <button class="logout-btn" onclick="doLogout()">Logout</button>
            </div>
        </div>

        <div class="sport-bar" id="sport-bar"></div>

        <div class="toolbar">
            <div style="position:relative;display:inline-block">
            <input class="search-box" id="search" type="text" placeholder="Search player or team..." oninput="renderBoard();document.getElementById('search-clear').style.display=this.value?'block':'none'">
            <button id="search-clear" onclick="document.getElementById('search').value='';this.style.display='none';renderBoard()" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:2px 4px;line-height:1">&times;</button>
        </div>
            <div class="books-btn-wrap">
                <button class="books-btn" onclick="toggleBooksPanel()">
                    Books <span class="cnt" id="books-cnt">0</span> &#9662;
                </button>
                <div class="books-panel" id="books-panel">
                    <div class="books-panel-header">
                        <span>Sportsbooks</span>
                        <button onclick="selectAllBooks()">All</button>
                        <button onclick="selectNoBooks()">None</button>
                    </div>
                    <div id="books-list"></div>
                </div>
            </div>
            <div class="active-books-summary" id="books-summary"></div>
            <span class="info" id="info"></span>
        </div>

        <div class="board" id="board">
            <div class="empty-state"><span class="spinner"></span> Loading props...</div>
        </div>
    </div>

    <script>
    // --- Firebase Auth Guard ---
    async function authFetch(url, options = {}) {
        const user = firebase.auth().currentUser;
        if (!user) { window.location.href = '/'; return null; }
        const token = await user.getIdToken();
        const headers = { ...(options.headers || {}), 'Authorization': 'Bearer ' + token };
        return fetch(url, { ...options, headers });
    }

    function doLogout() {
        firebase.auth().signOut().then(() => { window.location.href = '/'; });
    }

    firebase.auth().onAuthStateChanged(user => {
        if (!user) {
            window.location.href = '/';
            return;
        }
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('app').style.display = '';
        initApp();
    });

    // --- App Logic ---
    function initApp() {

    const $ = id => document.getElementById(id);
    const SPORTS = ['mlb','nba','nhl','nfl','ncaab','mma','soccer','tennis'];
    const SL = {mlb:'MLB',nba:'NBA',nhl:'NHL',nfl:'NFL',ncaab:'NCAAB',ncaaf:'NCAAF',mma:'MMA',soccer:'Soccer',tennis:'Tennis'};
    const BL = {pinnacle:'PIN',fanduel:'FD',draftkings:'DK',betmgm:'MGM',caesars:'CZR',bet365:'365',polymarket:'POLY',kalshi:'KAL',novig:'NOV','1xbet':'1X',betonline:'BOL',circa:'CIR',south_point:'SP',westgate:'WG',wynn:'WYN',stations:'STN',hardrock:'HR'};
    const BL_FULL = {pinnacle:'Pinnacle',fanduel:'FanDuel',draftkings:'DraftKings',betmgm:'BetMGM',caesars:'Caesars',bet365:'Bet365',polymarket:'Polymarket',kalshi:'Kalshi',novig:'Novig','1xbet':'1xBet',betonline:'BetOnline',circa:'Circa',south_point:'South Point',westgate:'Westgate',wynn:'Wynn',stations:'Stations',hardrock:'Hard Rock'};
    const ALL_KNOWN_BOOKS = ['pinnacle','caesars','draftkings','fanduel','betmgm','novig','polymarket','circa','hardrock','south_point','stations','westgate','wynn','bet365','kalshi','1xbet','betonline'];

    let activeSport = 'mlb';
    let propsData = {games:[]};
    const DEFAULT_BOOKS = ['fanduel','draftkings','betmgm','pinnacle','caesars'];
    let enabledBooks = new Set(DEFAULT_BOOKS);
    let bookOrder = [];
    let expandedGames = new Set();

    function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
    function fmt(p){if(p==null)return '--';return p>0?'+'+p:''+p}
    function priceCls(p){if(p==null)return 'na';return p>0?'pos':'neg'}

    // --- Sport bar ---
    function renderSportBar(){
        let h='';
        for(const s of SPORTS) h+=`<div class="stab ${s===activeSport?'active':''}" onclick="setSport('${s}')">${SL[s]||s.toUpperCase()}</div>`;
        $('sport-bar').innerHTML=h;
    }

    window.setSport = function(s){
        activeSport=s;
        // Save sport pref to Firestore
        authFetch('/api/preferences', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({preferences: {props_sport: s}})
        }).catch(e => console.error('Failed to save sport pref:', e));
        renderSportBar();
        loadProps(true);
    };

    // --- Books management (synced via Firestore, shared with odds board) ---
    let _prefsSaveTimer = null;
    function saveBookPrefs(){
        clearTimeout(_prefsSaveTimer);
        _prefsSaveTimer = setTimeout(() => {
            authFetch('/api/preferences', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({preferences: {
                    odds_books: [...enabledBooks],
                    odds_book_order: bookOrder,
                }})
            }).catch(e => console.error('Failed to save book prefs:', e));
        }, 500);
    }

    function getOrderedBooks(){
        const ordered = [];
        const seen = new Set();
        for(const b of bookOrder) { if(!seen.has(b)) { ordered.push(b); seen.add(b); } }
        for(const b of ALL_KNOWN_BOOKS) { if(!seen.has(b)) { ordered.push(b); seen.add(b); } }
        bookOrder = ordered;
        return ordered;
    }

    function getBooks(){
        return getOrderedBooks().filter(b=>enabledBooks.has(b));
    }

    function renderBookPills(){
        const ordered = getOrderedBooks();
        const enabled = getBooks();
        $('books-cnt').textContent = enabled.length;
        let sh='';
        for(const b of enabled) sh+=`<span class="abs-chip">${esc(BL[b]||b)}</span>`;
        $('books-summary').innerHTML=sh;
        let h='';
        for(let i=0;i<ordered.length;i++){
            const b = ordered[i];
            const on = enabledBooks.has(b);
            const full = BL_FULL[b]||b;
            const abbr = BL[b]||b;
            h+=`<div class="book-item" data-book="${b}">`;
            h+=`<button class="move-btn" onclick="moveBook('${b}',-1)" ${i===0?'disabled':''}>&#9650;</button>`;
            h+=`<button class="move-btn" onclick="moveBook('${b}',1)" ${i===ordered.length-1?'disabled':''}>&#9660;</button>`;
            h+=`<input type="checkbox" ${on?'checked':''} onchange="toggleBook('${b}')">`;
            h+=`<span class="book-label">${esc(full)}<span class="book-abbr">${esc(abbr)}</span></span>`;
            h+=`</div>`;
        }
        $('books-list').innerHTML=h;
    }

    window.toggleBook = function(b){
        if(enabledBooks.has(b)) enabledBooks.delete(b); else enabledBooks.add(b);
        saveBookPrefs(); renderBookPills(); renderBoard();
    };
    window.selectAllBooks = function(){
        enabledBooks = new Set(getOrderedBooks());
        saveBookPrefs(); renderBookPills(); renderBoard();
    };
    window.selectNoBooks = function(){
        enabledBooks = new Set();
        saveBookPrefs(); renderBookPills(); renderBoard();
    };
    window.moveBook = function(b, dir){
        const i = bookOrder.indexOf(b);
        if(i<0) return;
        const ni = i+dir;
        if(ni<0||ni>=bookOrder.length) return;
        bookOrder.splice(i,1);
        bookOrder.splice(ni,0,b);
        saveBookPrefs(); renderBookPills(); renderBoard();
    };

    let booksPanelOpen = false;
    window.toggleBooksPanel = function(){
        booksPanelOpen = !booksPanelOpen;
        $('books-panel').classList.toggle('open', booksPanelOpen);
    };
    document.addEventListener('click', e=>{
        if(booksPanelOpen && !e.target.closest('.books-btn-wrap')){
            booksPanelOpen=false;
            $('books-panel').classList.remove('open');
        }
    });

    // --- Best line finder ---
    function findBestLine(prop, side, books){
        let best = null;
        for(const bk of books){
            const bd = (prop.books||{})[bk];
            if(!bd) continue;
            const p = bd[side];
            if(p==null) continue;
            if(!best || p > best.price){
                best = {price: p, book: bk};
            }
        }
        return best;
    }

    // --- Game toggle ---
    window.toggleGame = function(eid){
        if(expandedGames.has(eid)) expandedGames.delete(eid);
        else expandedGames.add(eid);
        renderBoard();
    };

    // --- Toggle detail row ---
    window.toggleDetail = function(rowId){
        const el = document.getElementById(rowId);
        if(el) el.classList.toggle('open');
    };

    // --- Date/time formatting ---
    function fmtDateTime(iso){
        if(!iso) return '';
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    }

    // --- Render board ---
    window.renderBoard = function(){
        const games = propsData.games || [];
        const books = getBooks();
        const query = ($('search').value||'').toLowerCase().trim();

        if(!games.length){
            $('board').innerHTML = '<div class="empty-state">No player props available for this sport.</div>';
            return;
        }

        let html = '';
        let gameCount = 0;
        let propCount = 0;

        for(const game of games){
            const away = game.away_team || '';
            const home = game.home_team || '';
            const players = game.players || {};

            let filteredPlayers = {};
            for(const [pn, pd] of Object.entries(players)){
                if(query){
                    const haystack = `${pn} ${away} ${home}`.toLowerCase();
                    if(!haystack.includes(query)) continue;
                }
                const filteredProps = {};
                for(const [pk, prop] of Object.entries(pd.props||{})){
                    const hasEnabledBook = books.some(b => (prop.books||{})[b]);
                    if(hasEnabledBook) filteredProps[pk] = prop;
                }
                if(Object.keys(filteredProps).length > 0){
                    filteredPlayers[pn] = {props: filteredProps};
                }
            }

            if(Object.keys(filteredPlayers).length === 0) continue;

            gameCount++;
            const eid = game.event_id || `${away}-${home}`;
            const isOpen = query ? true : expandedGames.has(eid);

            html += `<div class="game">`;
            html += `<div class="game-header" onclick="toggleGame('${esc(eid)}')">`;
            html += `<div><span class="teams">${esc(away)} @ ${esc(home)}</span></div>`;
            html += `<div style="display:flex;align-items:center;gap:12px">`;
            html += `<span class="meta">${fmtDateTime(game.commence_time)}</span>`;
            html += `<span class="toggle ${isOpen?'open':''}">&#9660;</span>`;
            html += `</div>`;
            html += `</div>`;

            html += `<div class="props-body ${isOpen?'open':''}">`;
            html += `<table class="ptable">`;
            html += `<thead><tr>`;
            html += `<th>Player</th><th>Prop</th><th class="center">Line</th>`;
            html += `<th class="center">Best Over</th><th class="center">Best Under</th>`;
            html += `</tr></thead><tbody>`;

            const sortedPlayers = Object.entries(filteredPlayers).sort((a,b)=>a[0].localeCompare(b[0]));

            for(const [playerName, pd] of sortedPlayers){
                const sortedProps = Object.entries(pd.props).sort((a,b)=>(a[1].label||'').localeCompare(b[1].label||''));
                let firstProp = true;

                for(const [propKey, prop] of sortedProps){
                    propCount++;
                    const rowId = `detail-${eid}-${propKey}-${playerName}`.replace(/[^a-zA-Z0-9-]/g,'_');
                    const bestOver = findBestLine(prop, 'over', books);
                    const bestUnder = findBestLine(prop, 'under', books);
                    const point = prop.point != null ? prop.point : '';

                    html += `<tr style="cursor:pointer" onclick="toggleDetail('${rowId}')">`;
                    if(firstProp){
                        html += `<td class="player-name" rowspan="${sortedProps.length}">${esc(playerName)}</td>`;
                        firstProp = false;
                    }
                    html += `<td class="prop-label">${esc(prop.label||propKey)}</td>`;
                    html += `<td class="prop-point" style="text-align:center">${point !== '' ? point : '--'}</td>`;

                    if(bestOver){
                        html += `<td class="best-price ${priceCls(bestOver.price)}">${fmt(bestOver.price)}<span class="best-book">${esc(BL[bestOver.book]||bestOver.book)}</span></td>`;
                    } else {
                        html += `<td class="best-price na">--</td>`;
                    }

                    if(bestUnder){
                        html += `<td class="best-price ${priceCls(bestUnder.price)}">${fmt(bestUnder.price)}<span class="best-book">${esc(BL[bestUnder.book]||bestUnder.book)}</span></td>`;
                    } else {
                        html += `<td class="best-price na">--</td>`;
                    }

                    html += `</tr>`;

                    // Detail row (all books)
                    html += `<tr class="books-detail" id="${rowId}"><td colspan="5">`;
                    html += `<div class="books-grid">`;
                    for(const bk of books){
                        const bd = (prop.books||{})[bk];
                        if(!bd) continue;
                        const link = bd.link;
                        const bookName = BL[bk]||bk;
                        html += `<div class="book-chip">`;
                        html += `<span class="bname">${link ? `<a href="${esc(link)}" target="_blank" rel="noopener">${esc(bookName)}</a>` : esc(bookName)}</span>`;
                        html += `<span class="bover">${bd.over!=null?'O '+fmt(bd.over):'<span class="bna">--</span>'}</span>`;
                        html += `<span class="bunder">${bd.under!=null?'U '+fmt(bd.under):'<span class="bna">--</span>'}</span>`;
                        if(bd.point!=null) html += `<span style="font-size:10px;color:var(--text-muted)">${bd.point}</span>`;
                        html += `</div>`;
                    }
                    html += `</div></td></tr>`;
                }
            }

            html += `</tbody></table></div></div>`;
        }

        if(!html){
            html = '<div class="empty-state">No props match your search or enabled books.</div>';
        }

        $('board').innerHTML = html;
        $('info').textContent = `${gameCount} game${gameCount!==1?'s':''} \u00b7 ${propCount} props`;
    }

    // --- Data loading ---
    let firstLoad = true;
    async function loadProps(showLoading){
        if(showLoading && firstLoad){
            $('board').innerHTML = '<div class="empty-state"><span class="spinner"></span> Loading props...</div>';
        }
        const st = $('status');
        st.textContent = 'Refreshing...';
        st.className = 'status loading';

        try{
            const resp = await authFetch(`/api/props?sport=${activeSport}`);
            if(!resp) return;
            const data = await resp.json();
            if(!data.ok) throw new Error(data.error||'API error');

            propsData = data;
            renderBookPills();
            renderBoard();

            const now = new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'});
            st.textContent = `${data.cached?'(cached) ':''}${now}`;
            st.className = 'status';
            firstLoad = false;

            if(data.errors && data.errors.length){
                console.warn('Props errors:', data.errors);
            }
        } catch(err){
            const st = $('status');
            st.textContent = err.message;
            st.className = 'status error';
            console.error('Props load error:', err);
        }
    }

    // --- Init: load prefs then start ---
    async function loadAndStart() {
        try {
            const resp = await authFetch('/api/preferences');
            if (resp) {
                const data = await resp.json();
                if (data.ok && data.preferences) {
                    const p = data.preferences;
                    if (p.props_sport) activeSport = p.props_sport;
                    if (Array.isArray(p.odds_books) && p.odds_books.length) enabledBooks = new Set(p.odds_books);
                    if (Array.isArray(p.odds_book_order)) bookOrder = p.odds_book_order;
                }
            }
        } catch(e) {
            console.error('Failed to load preferences:', e);
        }

        renderSportBar();
        renderBookPills();
        await loadProps(true);
        setInterval(loadProps, 120000); // 2 minute refresh
    }
    loadAndStart();

    } // end initApp
    </script>
</body>
</html>
