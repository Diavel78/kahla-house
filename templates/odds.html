                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>
            </button>`;

            h+=`<div class="ghdr${isLive ? ' live' : ''}">`;
            h+=`<div>`;
            h+=`<span class="ghdr-league">${esc(leagueStr)}</span>`;
            if (isLive)  h+=`<span class="live-badge">LIVE</span>`;
            if (isFinal) h+=`<span class="live-badge final-badge">FINAL</span>`;
            if (showScore) {
                h+=`<span class="ghdr-teams">${esc(away)} <span class="score-inline">${sc.away_score} <span class="score-sep">-</span> ${sc.home_score}</span> ${esc(home)}</span>`;
                if (isLive) {
                    const stateLabel = sc.display_status || sc.period || sc.clock || '';
                    if (stateLabel) h+=`<span class="game-status">${esc(stateLabel)}</span>`;
                }
            } else {
                h+=`<span class="ghdr-teams">${esc(away)} <span class="at">@</span> ${esc(home)}</span>`;
            }
            if (isLive || isFinal) h+=`<span class="stale-tag">closing line</span>`;
            h+=`</div>`;
            h+=`<div class="ghdr-meta">${esc(date)} &middot; ${esc(time)} ${chartBtn}</div>`;
            h+=`</div>`;

            // === UNIFIED ODDS TABLE ===
            h+=`<div style="overflow-x:auto"><table class="odds-table">`;
            // Colgroup for fixed column widths
            h+=`<colgroup><col style="width:160px">`;  // team name
            h+=`<col style="width:70px"><col style="width:70px"><col style="width:70px">`;  // best ML/SPR/TOT
            for(let _b=0;_b<books.length;_b++) h+=`<col style="width:62px"><col style="width:62px"><col style="width:62px">`;
            h+=`</colgroup><thead>`;

            // First header row: Best Line label + best ML/SPR/TOT + book names
            h+=`<tr>`;
            h+=`<th class="th-best-label" colspan="1">Best Line</th>`;
            h+=`<th class="th-best-mkt">ML</th>`;
            h+=`<th class="th-best-mkt">Spread</th>`;
            h+=`<th class="th-best-mkt-last">Total</th>`;
            for(const bk of books){
                const link=(ev.books||{})[bk]?.event_link;
                const label=esc(BL[bk]||bk);
                const linkHtml=link?` <a class="deep-link" href="${esc(link)}" target="_blank">&#8599;</a>`:'';
                h+=`<th class="th-book-name" colspan="3">${label}${linkHtml}</th>`;
            }
            h+=`</tr>`;

            // Second header row: empty cells for best section + ML/SPR/TOT sub-headers per book
            h+=`<tr>`;
            h+=`<th class="th-empty"></th>`;
            h+=`<th class="th-empty"></th>`;
            h+=`<th class="th-empty"></th>`;
            h+=`<th class="th-empty-last"></th>`;
            for(const bk of books){
                h+=`<th class="th-book-mkt-first">ML</th><th class="th-book-mkt">SPR</th><th class="th-book-mkt">TOT</th>`;
            }
            h+=`</tr></thead><tbody>`;

            // Away row
            h+=`<tr>`;
            h+=`<td class="team-name">${esc(away)}</td>`;
            h+=bestCell(best.ml_away);
            h+=bestCellPt(best.spr_away);
            h+=bestCellPt(best.tot_over, 'O', true);
            for(const bk of books){
                const bd=(ev.books||{})[bk]||{};
                const ml=bd.moneyline?.[away];
                h+=`<td class="book-cell-first"><span class="odds-val-book ${ml!=null?cls(ml):'na'}">${fmt(ml)}</span></td>`;
                const sp=bd.spread?.[away];
                if(sp){h+=`<td class="book-cell"><span class="odds-point">${sp.point>0?'+'+sp.point:sp.point}</span><span class="odds-val-book ${cls(sp.price)}">${fmt(sp.price)}</span></td>`}
                else{h+=`<td class="book-cell"><span class="odds-val-book na">--</span></td>`}
                const tot=bd.total?.['Over'];
                if(tot){h+=`<td class="book-cell"><span class="odds-point">O ${tot.point}</span><span class="odds-val-book ${cls(tot.price)}">${fmt(tot.price)}</span></td>`}
                else{h+=`<td class="book-cell"><span class="odds-val-book na">--</span></td>`}
            }
            h+=`</tr>`;

            // Home row
            h+=`<tr>`;
            h+=`<td class="team-name">${esc(home)}</td>`;
            h+=bestCell(best.ml_home);
            h+=bestCellPt(best.spr_home);
            h+=bestCellPt(best.tot_under, 'U', true);
            for(const bk of books){
                const bd=(ev.books||{})[bk]||{};
                const ml=bd.moneyline?.[home];
                h+=`<td class="book-cell-first"><span class="odds-val-book ${ml!=null?cls(ml):'na'}">${fmt(ml)}</span></td>`;
                const sp=bd.spread?.[home];
                if(sp){h+=`<td class="book-cell"><span class="odds-point">${sp.point>0?'+'+sp.point:sp.point}</span><span class="odds-val-book ${cls(sp.price)}">${fmt(sp.price)}</span></td>`}
                else{h+=`<td class="book-cell"><span class="odds-val-book na">--</span></td>`}
                const tot=bd.total?.['Under'];
                if(tot){h+=`<td class="book-cell"><span class="odds-point">U ${tot.point}</span><span class="odds-val-book ${cls(tot.price)}">${fmt(tot.price)}</span></td>`}
                else{h+=`<td class="book-cell"><span class="odds-val-book na">--</span></td>`}
            }
            h+=`</tr></tbody></table></div>`;

            // === FOOTER: Movement bar + inline 6h PIN ML home sparkline ===
            const mv = computeMovement(ev, currentOpeners) || {};
            const hasMv = Object.keys(mv.ml||{}).length || Object.keys(mv.spread||{}).length;
            const sparkId = ev.id || ev.numeric_id;

            // Sharp score per market — composite of PIN movement +
            // public splits divergence (ML only) + PIN/retail divergence.
            // Splits event matched the same way drawSplitsRows() does.
            const splitsEv = (_splitsData && Array.isArray(_splitsData.events))
                ? _matchSplitsEvent(_splitsData.events, away, home) : null;
            const mlScore  = computeSharpScore(ev, mv, splitsEv, 'ml',     away, home);
            const sprScore = computeSharpScore(ev, mv, splitsEv, 'spread', away, home);
            const totScore = computeSharpScore(ev, mv, splitsEv, 'total',  away, home);

            h += `<div class="game-footer">`;
            if (hasMv) {
                h += `<div class="movement-bar">`;
                h += `<span class="mv-src">${mv.src || 'PIN'}</span>`;
                h += `<div class="mv-items">`;
                h += renderMovement(mv, 'ML',  'ml',     away, home, mlScore);
                h += renderMovement(mv, 'SPR', 'spread', away, home, sprScore);
                h += renderMovement(mv, 'TOT', 'total', 'Over', 'Under', totScore);
                h += `</div></div>`;
            }
            // Three PIN sparklines per game (ML home / Spread home / Total
            // over). drawSparklines() runs after each render and populates
            // the canvases with data from fetchSparklineBatch().
            if (sparkId) {
                h += `<div class="spark-wrap">`;
                h += renderSparkRow(sparkId, 'ml',     'ML',  esc(home));
                h += renderSparkRow(sparkId, 'spread', 'SPR', esc(home));
                h += renderSparkRow(sparkId, 'total',  'TOT', 'Over');
                h += `</div>`;
            }
            // Public splits row (Action Network — % bets vs % money for the
            // moneyline). Populated by drawSplitsRow() after the batched
            // /api/splits fetch resolves.
            h += `<div class="splits-row js-splits" data-away="${esc(away)}" data-home="${esc(home)}"></div>`;
            h += `</div>`;

            h+=`</div>`;
        }
        // Double-buffer: render into hidden back-board, then swap instantly
        const back = $('board-back');
        back.innerHTML = h;
        const scrollY = window.scrollY;
        // Swap: make back visible, hide front, then swap IDs
        requestAnimationFrame(() => {
            board.style.visibility = 'hidden';
            board.style.position = 'absolute';
            board.style.pointerEvents = 'none';
            back.style.visibility = '';
            back.style.position = '';
            back.style.pointerEvents = '';
            // Swap IDs so next render targets the now-hidden one
            board.id = 'board-back';
            back.id = 'board';
            window.scrollTo(0, scrollY);
            // Inline 6h PIN ML home sparklines for every game card.
            // Fires after the swap so the canvases exist in the visible board.
            drawSparklines();
            drawSplitsRows();
        });
    }

    /* ─── Public splits (Action Network) per game card ─── */
    let _splitsData = null;  // { events: [{away_team, home_team, ml: {...}, sharp_diff}] }

    async function fetchSplitsBatch() {
        try {
            const resp = await authFetch(`/api/splits?sport=${activeSport}`);
            if (!resp) return;
            const data = await resp.json();
            _splitsData = (data && data.ok) ? data : null;
        } catch (e) {
            _splitsData = null;
            console.warn('splits:', e);
        }
        drawSplitsRows();
    }

    function _matchSplitsEvent(splitsEvents, ourAway, ourHome) {
        if (!Array.isArray(splitsEvents)) return null;
        const a = (ourAway || '').toLowerCase();
        const h = (ourHome || '').toLowerCase();
        for (const ev of splitsEvents) {
            const sa = (ev.away_team || '').toLowerCase();
            const sh = (ev.home_team || '').toLowerCase();
            if (!sa || !sh) continue;
            // Action Network uses short names ("Pirates"); we have full
            // names ("Pittsburgh Pirates"). Substring containment in
            // either direction handles both ways.
            if ((a.includes(sa) || sa.includes(a)) &&
                (h.includes(sh) || sh.includes(h))) return ev;
        }
        return null;
    }

    function drawSplitsRows() {
        if (!_splitsData) return;
        const events = _splitsData.events || [];
        document.querySelectorAll('#board .js-splits').forEach(el => {
            const ours = _matchSplitsEvent(events, el.dataset.away, el.dataset.home);
            if (!ours || !ours.ml) {
                el.innerHTML = '';
                el.classList.remove('has-data');
                return;
            }
            const ml = ours.ml;
            const ab = ml.away_bets,  hb = ml.home_bets;
            const am = ml.away_money, hm = ml.home_money;
            const haveBets  = (ab != null && hb != null);
            const haveMoney = (am != null && hm != null);
            if (!haveBets && !haveMoney) {
                el.innerHTML = '';
                el.classList.remove('has-data');
                return;
            }

            const sharpHtml = (ours.sharp_diff != null && Math.abs(ours.sharp_diff) >= 10)
                ? `<span class="splits-sharp">SHARP ${ours.sharp_diff > 0 ? '+' : ''}${ours.sharp_diff}%</span>`
                : '';

            let inner = `
                <div class="splits-header">
                    <span class="splits-tag">PUBLIC</span> ML splits · away vs home
                    ${sharpHtml}
                </div>`;
            if (haveBets) {
                inner += `
                <div class="splits-line">
                    <span class="splits-bar-label">% bets</span>
                    <div class="splits-bar" style="flex:1">
                        <div class="splits-half away bets" style="width:${ab}%">${ab}%</div>
                        <div class="splits-half home bets" style="width:${hb}%">${hb}%</div>
                    </div>
                </div>`;
            }
            if (haveMoney) {
                inner += `
                <div class="splits-line">
                    <span class="splits-bar-label">% money</span>
                    <div class="splits-bar money" style="flex:1">
                        <div class="splits-half away money" style="width:${am}%">${am}%</div>
                        <div class="splits-half home money" style="width:${hm}%">${hm}%</div>
                    </div>
                </div>`;
            }
            el.innerHTML = inner;
            el.classList.add('has-data');
        });
    }

    /* ─── Inline 6H PIN sparklines per game card (ML / SPR / TOT) ─── */
    let _sparkData = null;
    const _sparkInstances = {};  // keyed by `${market_id}::${mkt}` (ml/spread/total)

    // American → implied probability so the ML chart axis is continuous
    // around the +100/-100 favorite/dog flip.
    function _amerToProb(p) {
        if (p == null || !Number.isFinite(p)) return null;
        if (p > 0) return 100 / (p + 100);
        if (p < 0) return -p / (-p + 100);
        return 0.5;
    }
    function _probToAmer(p) {
        if (!Number.isFinite(p) || p <= 0 || p >= 1) return null;
        return p >= 0.5 ? Math.round(-p / (1 - p) * 100)
                        : Math.round((1 - p) / p * 100);
    }
    function _fmtAmer(v) {
        if (v == null || !Number.isFinite(v)) return '--';
        return v > 0 ? '+' + v : '' + v;
    }
    function _fmtPoint(v) {
        if (v == null || !Number.isFinite(v)) return '';
        // Round to 1 decimal place to avoid Chart.js auto-generated ticks
        // showing things like "+1.5000000000000002" (binary float artifact
        // when the chart range is tiny).
        const r = Math.round(v * 10) / 10;
        return r > 0 ? '+' + r : '' + r;
    }
    // "last odds update Nm ago" formatter. Takes ISO string from the server
    // (most recent captured_at across visible snaps). Returns "just now",
    // "Xm ago", "Xh ago", or "—" when no data.
    function _fmtDataAge(iso) {
        if (!iso) return 'never';
        const t = new Date(iso).valueOf();
        if (!Number.isFinite(t)) return 'never';
        const diffSec = Math.max(0, Math.floor((Date.now() - t) / 1000));
        if (diffSec < 60)   return 'just now';
        if (diffSec < 3600) return Math.floor(diffSec / 60) + 'm ago';
        if (diffSec < 86400) return Math.floor(diffSec / 3600) + 'h ago';
        return Math.floor(diffSec / 86400) + 'd ago';
    }

    // HTML for one sparkline row inside a game card. Data attributes let
    // drawSparklines() find the canvas + its market type after each render.
    function renderSparkRow(sparkId, mkt, mktLabel, sideLabel) {
        const id = esc(sparkId);
        return `<div class="spark-row">
            <div class="spark-label">
                <span class="spark-tag">PIN</span>
                <span class="spark-mkt">${esc(mktLabel)}</span>
                ${esc(sideLabel)}
                <span class="spark-current js-spark-current" data-mid="${id}" data-mkt="${esc(mkt)}"></span>
                <span class="spark-range">6H</span>
            </div>
            <div class="spark-canvas-wrap">
                <canvas class="js-spark" data-mid="${id}" data-mkt="${esc(mkt)}"></canvas>
                <div class="spark-empty js-spark-empty" data-mid="${id}" data-mkt="${esc(mkt)}" style="display:none">no PIN history yet</div>
            </div>
        </div>`;
    }

    async function fetchSparklineBatch() {
        try {
            const resp = await authFetch(`/api/odds/history-batch?sport=${activeSport}`);
            if (!resp) return;
            const data = await resp.json();
            _sparkData = (data && data.ok) ? (data.events || {}) : {};
        } catch (e) {
            _sparkData = {};
            console.warn('history-batch:', e);
        }
        drawSparklines();
    }

    function drawSparklines() {
        if (typeof Chart === 'undefined') return;
        if (!_sparkData) return;
        document.querySelectorAll('#board canvas.js-spark').forEach(canvas => {
            const mid = canvas.dataset.mid;
            const mkt = canvas.dataset.mkt;  // 'ml' | 'spread' | 'total'
            const slot = (_sparkData[mid] || {})[mkt];
            const emptyEl = document.querySelector(
                `#board .js-spark-empty[data-mid="${mid}"][data-mkt="${mkt}"]`);
            const currentEl = document.querySelector(
                `#board .js-spark-current[data-mid="${mid}"][data-mkt="${mkt}"]`);

            // Destroy any prior chart instance for this canvas
            const key = `${mid}::${mkt}`;
            const prior = _sparkInstances[key];
            if (prior) { try { prior.destroy(); } catch {} delete _sparkInstances[key]; }

            const series = (slot && slot.series) || [];
            if (!series.length) {
                canvas.style.display = 'none';
                if (emptyEl) emptyEl.style.display = '';
                if (currentEl) currentEl.textContent = '';
                return;
            }
            canvas.style.display = '';
            if (emptyEl) emptyEl.style.display = 'none';

            // All three sparklines plot the PRICE (odds), not the line.
            // Sportsbooks rarely move the spread / total point itself —
            // they move the juice on it (-110 → -115 → -105 etc). That's
            // the meaningful movement to graph. The line value (-1.5, 8.5,
            // etc.) is shown as label context.
            // Plotted as implied probability internally so the Y axis is
            // continuous around the +100/-100 favorite/dog flip; tick
            // callback re-labels in American odds.
            const points = series.map(p => ({
                x:     new Date(p.ts).valueOf(),
                y:     _amerToProb(p.price),
                _amer: p.price,
                _line: p.line,
            })).filter(p => Number.isFinite(p.x) && Number.isFinite(p.y));
            if (!points.length) {
                canvas.style.display = 'none';
                if (emptyEl) emptyEl.style.display = '';
                if (currentEl) currentEl.textContent = '';
                return;
            }
            // Carry forward to "now" so the line reaches the right edge.
            // For frozen (live/final) games the server already capped data at
            // event_start; this just stretches the flat tail to "now".
            const last = points[points.length - 1];
            points.push({ x: Date.now(), y: last.y, _amer: last._amer, _line: last._line });

            // Current-value label next to the row title.
            //   ML:     "+135"
            //   SPR:    "-1.5  -110"
            //   TOT:    "+8.5  -110"
            const isML = mkt === 'ml';
            if (currentEl) {
                if (isML) {
                    currentEl.textContent = _fmtAmer(last._amer);
                } else {
                    const lineStr = _fmtPoint(last._line);
                    currentEl.textContent = `${lineStr}  ${_fmtAmer(last._amer)}`;
                }
            }

            _sparkInstances[key] = new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: { datasets: [{
                    data: points,
                    borderColor: '#fbbf24',
                    backgroundColor: 'rgba(251,191,36,0.10)',
                    fill: true,
                    pointRadius: 0,
                    pointHoverRadius: 3,
                    borderWidth: 1.5,
                    stepped: 'after',
                    tension: 0,
                }] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#13171e',
                            borderColor: '#1e2530', borderWidth: 1,
                            displayColors: false,
                            callbacks: {
                                title: items => new Date(items[0].parsed.x).toLocaleString('en-US', {
                                    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit',
                                }),
                                label: item => {
                                    const p = item.raw;
                                    if (isML) return _fmtAmer(p._amer);
                                    return `${_fmtPoint(p._line)}  ${_fmtAmer(p._amer)}`;
                                },
                            },
                        },
                    },
                    scales: {
                        x: { type: 'time', display: false, grid: { display: false } },
                        y: {
                            display: true,
                            position: 'right',
                            grid: { color: 'rgba(255,255,255,0.04)' },
                            ticks: {
                                color: '#8890a8',
                                font: { family: 'JetBrains Mono, monospace', size: 9 },
                                maxTicksLimit: 4,
                                // All three charts plot probability internally;
                                // re-label the ticks back in American odds.
                                callback: v => _fmtAmer(_probToAmer(v)),
                            },
                        },
                    },
                    elements: { line: { borderJoinStyle: 'round' } },
                },
            });
        });
    }

    let firstLoad = true;
    async function loadOdds(showLoading){
        const status=$('status');
        if(showLoading || firstLoad){
            status.textContent='Loading...';
            status.className='status loading';
        }
        try{
            const resp=await authFetch(`/api/odds?sport=${activeSport}`);
            if (!resp) return;
            const data=await resp.json();
            if(!data.ok){
                status.textContent=data.error||'Error';
                status.className='status error';
                if(firstLoad) $('board').innerHTML=`<div class="empty-state">${esc(data.error||'API error')}</div>`;
                return;
            }
            // Only re-render if the game list changed (new games, removed games, score state change)
            // Price-only changes don't warrant a full DOM rebuild
            const gameKey = JSON.stringify((data.events||[]).map(e => e.id + '|' + (e.score?.live||'') + '|' + (e.score?.away_score||'') + '|' + (e.score?.home_score||'')));
            const gamesChanged = gameKey !== window._lastGameKey;
            window._lastGameKey = gameKey;
            oddsData=data;
            if (firstLoad) {
                // Allow fade-in animation on first load, then disable for subsequent renders
                setTimeout(() => {
                    document.querySelectorAll('.board-wrap').forEach(el => el.classList.add('no-animate'));
                }, 600);
            }
            firstLoad=false;
            // Don't overwrite user's book selection when switching sports.
            // Just track what books are available for rendering — enabledBooks stays as user chose.
            // Capture opening lines for today (Firestore-backed legacy capture).
            currentOpeners = await captureOpeners(data.events||[], activeSport);
            // Then merge scanner-backed openers on top — these are the genuine
            // earliest-seen lines from the 30-min Odds API cron, and override the
            // legacy "first time the user opened the page" Firestore values.
            mergeScannerOpenersInto(data.events || []);
            const n = (data.events || []).length;
            // "last odds update Nm ago" \u2014 based on the most recent cron-written
            // snapshot, NOT the current wall clock. We poll every 30s during
            // live games for ESPN scores, but the actual odds only change
            // when the cron writes (every 30 min). Earlier the wall clock made
            // the page look like everything was updating live; this is honest.
            const ageStr = _fmtDataAge(data.last_data_iso);
            status.textContent = `${n} games \u00b7 last odds update ${ageStr}`;
            status.className='status';
            renderBookPills();
            if (gamesChanged) renderBoard();
        }catch(err){
            if(firstLoad){
                status.textContent='Fetch error';
                status.className='status error';
            }
            console.error(err);
        }
    }

    window.setSport = function(s){
        activeSport=s;
        firstLoad=true;
        authFetch('/api/preferences', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({preferences: {odds_sport: s}})
        }).catch(e => console.error('Failed to save sport pref:', e));
        renderSportBar();
        // Splits/SHARP-RLM removed when Owls was retired. Just openers + scanner-backed openers.
        Promise.all([
            loadOpeners(s),
            loadScannerOpeners(s),
        ]).then(([op, scnOps]) => {
            currentOpeners = op;
            scannerOpeners = scnOps;
            // Sparkline + splits data is per-sport; wipe before re-fetching.
            _sparkData = null;
            _splitsData = null;
            for (const k of Object.keys(_sparkInstances)) {
                try { _sparkInstances[k].destroy(); } catch {}
                delete _sparkInstances[k];
            }
            loadOdds(true);
            fetchSparklineBatch();
            fetchSplitsBatch();
        });
    };

    // Load user preferences from Firestore, then start the app
    async function loadAndStart() {
        try {
            const resp = await authFetch('/api/preferences');
            if (resp) {
                const data = await resp.json();
                if (data.ok && data.preferences) {
                    const p = data.preferences;
                    if (p.odds_sport) activeSport = p.odds_sport;
                    if (Array.isArray(p.odds_books) && p.odds_books.length) enabledBooks = new Set(p.odds_books);
                    if (Array.isArray(p.odds_book_order)) bookOrder = p.odds_book_order;
                }
            }
        } catch(e) {
            console.error('Failed to load preferences:', e);
        }

        renderSportBar();
        const [op, scnOps] = await Promise.all([
            loadOpeners(activeSport),
            loadScannerOpeners(activeSport),
        ]);
        currentOpeners = op;
        scannerOpeners = scnOps;
        await loadOdds();
        fetchSparklineBatch();
        fetchSplitsBatch();
        // Adaptive polling. Server hits we make on each tick:
        //   - Supabase READ (free, no API credits)
        //   - ESPN scoreboard (free, server-cached 30s)
        //   - The Odds API: NEVER from this poll. Cron is the only writer.
        // So we can poll fast during live games (score keeps ticking) without
        // burning the $59/100K credit budget on the actual odds feed.
        scheduleNextLoad();
    }

    function _hasLiveOnBoard() {
        return ((oddsData && oddsData.events) || []).some(
            e => e.is_live || (e.score && (e.score.live || e.score.state === 'in'))
        );
    }
    function scheduleNextLoad() {
        if (window._loadOddsTimer) clearTimeout(window._loadOddsTimer);
        const delay = _hasLiveOnBoard() ? 30000 : 90000;
        window._loadOddsTimer = setTimeout(async () => {
            try {
                await loadOdds();
                // Sparklines refresh too (cron writes new PIN snapshots every
                // 30 min; a refresh between cron runs is a no-op for the chart
                // but cheap — single batched Supabase read per sport).
                fetchSparklineBatch();
                fetchSplitsBatch();
            } finally {
                scheduleNextLoad();
            }
        }, delay);
    }
    loadAndStart();
    // (window.debugMarkets / ?debug=markets overlay was tied to the
    // /api/odds/debug-markets endpoint that we deleted with the Owls
    // scrubbing — removed.)

    } // end initApp
    </script>

    <!-- ─── Line-movement chart modal ─── -->
    <div class="chart-modal-bg" id="chartModalBg" onclick="if(event.target===this)closeChartModal()">
        <div class="chart-modal">
            <div class="chart-hdr">
                <div>
                    <div class="chart-hdr-title" id="chartHdrTitle">—</div>
                    <div class="chart-hdr-meta" id="chartHdrMeta"></div>
                </div>
                <button class="chart-close" onclick="closeChartModal()" aria-label="Close">&times;</button>
            </div>
            <div class="chart-controls">
                <div class="chart-pill-row" id="chartMarketRow">
                    <span class="label">MARKET</span>
                    <button class="chart-pill active" data-market="ml" onclick="setChartMarket('ml')">ML</button>
                    <button class="chart-pill" data-market="spread" onclick="setChartMarket('spread')">Spread</button>
                    <button class="chart-pill" data-market="total" onclick="setChartMarket('total')">Total</button>
                </div>
                <div class="chart-pill-row" id="chartSideRow">
                    <span class="label">SIDE</span>
                    <!-- pills built dynamically per market + teams -->
                </div>
                <div class="chart-pill-row" id="chartSpanRow">
                    <span class="label">RANGE</span>
                    <button class="chart-pill" data-span="15m" onclick="setChartSpan('15m')">15m</button>
                    <button class="chart-pill" data-span="30m" onclick="setChartSpan('30m')">30m</button>
                    <button class="chart-pill" data-span="1h" onclick="setChartSpan('1h')">1H</button>
                    <button class="chart-pill" data-span="6h" onclick="setChartSpan('6h')">6H</button>
                    <button class="chart-pill active" data-span="12h" onclick="setChartSpan('12h')">12H</button>
                    <button class="chart-pill" data-span="24h" onclick="setChartSpan('24h')">24H</button>
                    <button class="chart-pill" data-span="all" onclick="setChartSpan('all')">All</button>
                </div>
                <div class="chart-pill-row" id="chartBooksRow">
                    <span class="label">BOOKS</span>
                </div>
            </div>
            <div class="chart-canvas-wrap">
                <canvas id="chartCanvas"></canvas>
                <div class="chart-empty" id="chartEmpty" style="display:none">
                    No movement data captured for this game yet. The Odds API ingest runs every 30 minutes — check back shortly.
                </div>
            </div>
        </div>
    </div>

    <script>
    /* ─── Line-movement chart logic (separate scope from initApp) ─── */
    (function(){
        // Default-on is just PIN (the sharp anchor). The rest are toggles.
        // Circa removed entirely — not in The Odds API since the Owls swap.
        const CHART_BOOKS = [
            { code: 'PIN', label: 'PIN', color: '#fbbf24', defaultOn: true  },
            { code: 'DK',  label: 'DK',  color: '#22c55e', defaultOn: false },
            { code: 'FD',  label: 'FD',  color: '#06b6d4', defaultOn: false },
            { code: 'MGM', label: 'MGM', color: '#a855f7', defaultOn: false },
            { code: 'CAE', label: 'CAE', color: '#f97316', defaultOn: false },
            { code: 'HR',  label: 'HR',  color: '#ec4899', defaultOn: false },
            { code: 'BOL', label: 'BOL', color: '#84cc16', defaultOn: false },
        ];

        const state = {
            sport: null, home: '', away: '', commence: '',
            market: 'ml',
            side: 'home',  // 'home'|'away' for ml/spread, 'over'|'under' for total
            span: '12h',
            enabled: new Set(CHART_BOOKS.filter(b=>b.defaultOn).map(b=>b.code)),
            data: null,
            chart: null,
            inflight: 0,
        };

        function sidesForMarket(market) {
            return market === 'total' ? ['over', 'under'] : ['away', 'home'];
        }
        function defaultSide(market) {
            return market === 'total' ? 'over' : 'home';
        }
        function sideLabel(market, side) {
            if (market === 'total') return side === 'over' ? 'Over' : 'Under';
            return side === 'home' ? state.home : state.away;
        }

        function buildSidePills() {
            const row = document.getElementById('chartSideRow');
            while (row.children.length > 1) row.removeChild(row.lastChild);
            for (const side of sidesForMarket(state.market)) {
                const btn = document.createElement('button');
                btn.className = 'chart-pill' + (state.side === side ? ' active' : '');
                btn.textContent = sideLabel(state.market, side);
                btn.dataset.side = side;
                btn.onclick = () => { state.side = side; buildSidePills(); renderChart(); };
                row.appendChild(btn);
            }
        }

        function bookByCode(code) { return CHART_BOOKS.find(b => b.code === code); }

        // American odds <-> implied probability (with vig). Used to plot on
        // a continuous probability Y axis instead of the discontinuous
        // American-odds scale (where +100 and -100 are the same 50% point
        // separated by a 200-cent visual cliff).
        function americanToProb(price) {
            if (price == null || !Number.isFinite(price)) return null;
            if (price > 0) return 100 / (price + 100);
            if (price < 0) return -price / (-price + 100);
            return 0.5;
        }
        function probToAmerican(p) {
            if (!Number.isFinite(p) || p <= 0 || p >= 1) return null;
            return p >= 0.5
                ? Math.round(-p / (1 - p) * 100)
                : Math.round((1 - p) / p * 100);
        }
        function fmtAmerican(v) {
            if (v == null || !Number.isFinite(v)) return '--';
            return v > 0 ? '+' + v : '' + v;
        }

        function buildBookPills() {
            const row = document.getElementById('chartBooksRow');
            // Remove all but the first child (the LABEL span)
            while (row.children.length > 1) row.removeChild(row.lastChild);
            for (const b of CHART_BOOKS) {
                const btn = document.createElement('button');
                btn.className = 'chart-pill book' + (state.enabled.has(b.code) ? ' active' : '');
                btn.textContent = b.label;
                btn.style.borderColor = state.enabled.has(b.code) ? b.color : '';
                btn.style.color = state.enabled.has(b.code) ? b.color : '';
                btn.style.background = state.enabled.has(b.code) ? (b.color + '22') : '';
                btn.onclick = () => toggleBook(b.code);
                row.appendChild(btn);
            }
        }

        function setActivePill(rowId, attr, value) {
            document.querySelectorAll('#' + rowId + ' .chart-pill').forEach(el => {
                el.classList.toggle('active', el.dataset[attr] === value);
            });
        }

        window.setChartMarket = function(m) {
            state.market = m;
            // Switching market may invalidate the current side (e.g. from
            // 'home' to a Total chart) — reset to the market's default side.
            if (!sidesForMarket(m).includes(state.side)) {
                state.side = defaultSide(m);
            }
            setActivePill('chartMarketRow', 'market', m);
            buildSidePills();
            fetchAndRender();
        };
        window.setChartSpan = function(s) {
            state.span = s;
            setActivePill('chartSpanRow', 'span', s);
            fetchAndRender();
        };
        function toggleBook(code) {
            if (state.enabled.has(code)) state.enabled.delete(code);
            else state.enabled.add(code);
            buildBookPills();
            renderChart();  // no refetch — server returned all books, we filter client-side
        }

        async function authFetchSafe(url) {
            const u = firebase.auth().currentUser;
            if (!u) return null;
            const tok = await u.getIdToken();
            return fetch(url, { headers: { Authorization: 'Bearer ' + tok } });
        }

        async function fetchAndRender() {
            const seq = ++state.inflight;
            const params = new URLSearchParams({
                sport: state.sport || '',
                home: state.home,
                away: state.away,
                commence: state.commence,
                market: state.market,
                since: state.span,
            });
            try {
                const resp = await authFetchSafe('/api/odds/history?' + params.toString());
                if (!resp || !resp.ok) { state.data = null; renderChart(); return; }
                const j = await resp.json();
                if (seq !== state.inflight) return; // stale
                state.data = j;
            } catch (e) {
                state.data = null;
            }
            renderChart();
        }

        function renderChart() {
            const canvas = document.getElementById('chartCanvas');
            const empty  = document.getElementById('chartEmpty');
            const meta   = document.getElementById('chartHdrMeta');

            if (state.chart) { state.chart.destroy(); state.chart = null; }

            const data = state.data;
            const haveAny = data && data.books && Object.keys(data.books).length > 0;
            if (!haveAny) {
                canvas.style.display = 'none';
                empty.style.display  = '';
                meta.textContent = '';
                return;
            }
            canvas.style.display = '';
            empty.style.display  = 'none';

            // Only plot the currently selected side. Showing both sides at
            // once forces the Y-axis to span both ML legs (e.g. -150 to +130),
            // which squashes any actual movement into a flat line.
            const side = state.side;

            const datasets = [];
            for (const b of CHART_BOOKS) {
                if (!state.enabled.has(b.code)) continue;
                const byBook = (data.books || {})[b.code];
                if (!byBook) continue;
                const arr = byBook[side];
                if (!arr || !arr.length) continue;
                // Convert ISO strings to Unix ms so Chart.js's time scale
                // doesn't have to guess timezone parsing.
                // Y is implied probability, NOT raw American odds. American
                // has a 200-cent discontinuity at ±100 (both = 50%) so plotting
                // it linearly draws huge fake cliffs every favorite/dog flip.
                // Probability is continuous — the tick callback labels each
                // tick back in American so the user still reads odds, not %.
                // The original American price is kept in `_american` for the
                // tooltip.
                const points = arr
                    .map(p => ({
                        x: new Date(p.ts).valueOf(),
                        y: americanToProb(p.price),
                        _american: p.price,
                        _line: p.line,
                    }))
                    .filter(p => Number.isFinite(p.x) && Number.isFinite(p.y));
                const last = points[points.length - 1];
                if (last) points.push({ x: Date.now(), y: last.y, _american: last._american, _line: last._line });
                datasets.push({
                    label: b.label,  // side is already shown in the SIDE pill row
                    data: points,
                    borderColor: b.color,
                    backgroundColor: b.color + '33',
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    borderWidth: 2,
                    // Step interpolation — books post a line and sit, then
                    // jump. A tensioned curve would lie about gradual drift
                    // that never happened.
                    stepped: 'after',
                    tension: 0,
                });
            }

            if (!datasets.length) {
                canvas.style.display = 'none';
                empty.style.display  = '';
                empty.textContent = 'No data for the selected books / range. Try toggling more books or expanding the range.';
                return;
            }

            // Header meta: market + side label + sample count
            const totalPoints = datasets.reduce((n, d) => n + d.data.length - 1, 0);
            const mktLabel = data.market === 'moneyline' ? 'Moneyline'
                          : data.market === 'spread' ? 'Spread'
                          : 'Total';
            meta.textContent = `${mktLabel} · ${sideLabel(state.market, side)} · ${totalPoints} samples`;

            const ctx = canvas.getContext('2d');
            state.chart = new Chart(ctx, {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'nearest', intersect: false },
                    // Chart.js needs default parsing enabled so the time
                    // scale can handle our ISO-string x values.
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#cbd5e1', boxWidth: 12, boxHeight: 2,
                                font: { family: 'JetBrains Mono, monospace', size: 11 },
                            },
                        },
                        tooltip: {
                            backgroundColor: '#13171e',
                            borderColor: '#1e2530', borderWidth: 1,
                            titleFont: { family: 'DM Sans, sans-serif', size: 12 },
                            bodyFont: { family: 'JetBrains Mono, monospace', size: 11 },
                            callbacks: {
                                title: items => {
                                    const d = new Date(items[0].parsed.x);
                                    return d.toLocaleString('en-US', {
                                        month: 'short', day: 'numeric',
                                        hour: 'numeric', minute: '2-digit',
                                    });
                                },
                                label: item => {
                                    const ds = item.dataset;
                                    const p  = item.raw;
                                    const american = fmtAmerican(p._american);
                                    const line = p._line != null ? ' @ ' + p._line : '';
                                    return ds.label + ': ' + american + line;
                                },
                            },
                        },
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { tooltipFormat: 'MMM d, h:mm a' },
                            grid: { color: 'rgba(255,255,255,0.04)' },
                            ticks: { color: '#8890a8', font: { family: 'JetBrains Mono, monospace', size: 10 } },
                        },
                        y: {
                            // Y values are implied probability (0-1). Tick
                            // labels re-derive American odds so the user sees
                            // familiar +/- numbers and never a "0" tick.
                            grid: { color: 'rgba(255,255,255,0.04)' },
                            ticks: {
                                color: '#8890a8',
                                font: { family: 'JetBrains Mono, monospace', size: 10 },
                                callback: v => fmtAmerican(probToAmerican(v)),
                                // Avoid Chart.js trying to find a "0" tick or
                                // generating evenly-spaced probability ticks
                                // that map to weird American values.
                                maxTicksLimit: 6,
                            },
                        },
                    },
                },
            });
        }

        window.openChartModal = function(opts) {
            state.sport    = opts.sport;
            state.home     = opts.home;
            state.away     = opts.away;
            state.commence = opts.commence;
            state.market   = 'ml';
            state.side     = defaultSide('ml');
            state.span     = '12h';
            state.enabled  = new Set(CHART_BOOKS.filter(b=>b.defaultOn).map(b=>b.code));
            document.getElementById('chartHdrTitle').textContent = opts.away + ' @ ' + opts.home;
            setActivePill('chartMarketRow', 'market', 'ml');
            setActivePill('chartSpanRow', 'span', '12h');
            buildSidePills();
            buildBookPills();
            document.getElementById('chartModalBg').classList.add('open');
            fetchAndRender();
        };

        window.closeChartModal = function() {
            document.getElementById('chartModalBg').classList.remove('open');
            if (state.chart) { state.chart.destroy(); state.chart = null; }
            state.data = null;
        };

        // Close on Esc
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && document.getElementById('chartModalBg').classList.contains('open')) {
                window.closeChartModal();
            }
        });

        // Delegated click handler for the per-game chart icons. The Odds Board
        // re-renders the game list frequently — using delegation keeps a single
        // listener regardless of how many times innerHTML gets swapped.
        document.addEventListener('click', e => {
            const btn = e.target.closest('.js-chart-btn');
            if (!btn) return;
            window.openChartModal({
                sport:    btn.dataset.sport,
                home:     btn.dataset.home,
                away:     btn.dataset.away,
                commence: btn.dataset.commence,
            });
        });
    })();
    </script>
</body>
</html>
