<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahla House — Odds Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Firebase Auth (compat mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <!-- Chart.js (line-movement chart modal) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script>
        const FC = {
            apiKey: "AIzaSyDQbjlc7VIYmFjbhq119Cl1-JhuXwKq0fY",
            authDomain: "kahla-house.firebaseapp.com",
            projectId: "kahla-house",
            storageBucket: "kahla-house.firebasestorage.app",
            messagingSenderId: "1029771942929",
            appId: "1:1029771942929:web:76358096dbb868e375a5b0"
        };
        firebase.initializeApp(FC);
    </script>

    <style>
        :root {
            --bg: #0b0e13;
            --surface: #13171e;
            --surface-2: #1a1f2b;
            --surface-3: #1f2533;
            --border: #1e2530;
            --border-light: #2a3140;
            --text: #e2e8f0;
            --text-secondary: #8890a8;
            --text-muted: #555d78;
            --blue: #4a7cff;
            --blue-dim: rgba(74,124,255,0.08);
            --green: #22c55e;
            --green-dim: rgba(34,197,94,0.10);
            --orange: #f59e0b;
            --orange-dim: rgba(245,158,11,0.10);
            --red: #ef4444;
            --red-dim: rgba(239,68,68,0.10);
            --purple: #a855f7;
            --cyan: #06b6d4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            overflow-x: hidden;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(74,124,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(74,124,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(74,124,255,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 56px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .top-bar-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            letter-spacing: -0.5px;
        }
        .top-bar-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .nav-links {
            display: flex;
            gap: 4px;
            margin-left: 12px;
        }
        .nav-link {
            padding: 6px 14px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.15s;
        }
        .nav-link:hover {
            color: var(--text);
            background: var(--surface-2);
        }
        .nav-link.active {
            color: #fff;
            background: var(--blue);
        }
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            min-height: 16px;
            white-space: nowrap;
        }
        .status.loading { color: var(--orange); }
        .status.error { color: var(--red); }
        .logout-btn {
            padding: 6px 14px;
            background: var(--surface-2);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
        }
        .logout-btn:hover {
            background: var(--border);
            color: var(--text);
        }

        /* Sport bar */
        .sport-bar {
            display: flex;
            gap: 0;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            overflow-x: auto;
            position: relative;
            z-index: 5;
        }
        .stab {
            padding: 12px 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            white-space: nowrap;
            transition: all 0.15s;
            font-family: 'DM Sans', sans-serif;
        }
        .stab:hover { color: var(--text); }
        .stab.active { color: #fff; border-bottom-color: var(--blue); }

        /* Toolbar */
        .toolbar {
            display: flex;
            gap: 12px;
            padding: 16px 24px;
            align-items: center;
            flex-wrap: wrap;
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 5;
        }
        .search-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 9px 16px;
            color: var(--text);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            width: 260px;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-box:focus { border-color: var(--blue); }
        .search-box::placeholder { color: var(--text-muted); }
        .info {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--text-muted);
            margin-left: auto;
            white-space: nowrap;
        }

        /* Books button + dropdown */
        .books-btn-wrap { position: relative; }
        .books-btn {
            padding: 8px 16px;
            background: var(--surface);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }
        .books-btn:hover { background: var(--surface-2); color: var(--text); }
        .books-btn .cnt {
            background: var(--blue);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 1px 7px;
            border-radius: 10px;
        }
        .books-panel {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 280px;
            max-height: 440px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 12px 40px rgba(0,0,0,.5);
        }
        .books-panel.open { display: block; }
        .books-panel-header {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .books-panel-header span { font-size: 13px; font-weight: 700; color: var(--text); }
        .books-panel-header button {
            font-size: 11px;
            color: var(--blue);
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
        }
        .book-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-bottom: 1px solid rgba(30,37,48,0.5);
            cursor: grab;
            user-select: none;
            transition: background 0.1s;
        }
        .book-item:hover { background: var(--surface-2); }
        .book-item:last-child { border-bottom: none; }
        .book-item.dragging { opacity: .4; background: var(--bg); }
        .book-item input[type=checkbox] { accent-color: var(--blue); width: 16px; height: 16px; cursor: pointer; }
        .book-item .book-label { flex: 1; font-size: 13px; color: var(--text); }
        .book-item .book-abbr {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            margin-left: 4px;
        }
        .book-item .move-btn {
            color: var(--text-muted);
            font-size: 16px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 3px;
            line-height: 1;
        }
        .book-item .move-btn:hover { color: var(--blue); }
        .active-books-summary { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
        .abs-chip {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--surface-2);
            padding: 3px 8px;
            border-radius: 6px;
        }

        /* Board */
        .board-wrap { position: relative; }
        .board {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 24px 60px;
            position: relative;
            z-index: 1;
        }

        /* Game card */
        .game {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
            transition: all 0.2s;
            opacity: 0;
            animation: fadeUp 0.4s ease forwards;
        }
        .no-animate .game {
            opacity: 1;
            animation: none;
        }
        .game:hover {
            border-color: var(--border-light);
            box-shadow: 0 4px 24px rgba(0,0,0,0.25);
        }
        .game:nth-child(1) { animation-delay: 0.02s; }
        .game:nth-child(2) { animation-delay: 0.04s; }
        .game:nth-child(3) { animation-delay: 0.06s; }
        .game:nth-child(4) { animation-delay: 0.08s; }
        .game:nth-child(5) { animation-delay: 0.10s; }
        .game:nth-child(6) { animation-delay: 0.12s; }
        .game:nth-child(7) { animation-delay: 0.14s; }
        .game:nth-child(8) { animation-delay: 0.16s; }
        .game:nth-child(9) { animation-delay: 0.18s; }
        .game:nth-child(10) { animation-delay: 0.20s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Game header */
        .ghdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
        }
        .ghdr-teams {
            font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.2px;
        }
        .ghdr-teams .at { color: var(--text-muted); font-weight: 400; margin: 0 8px; font-size: 13px; }
        .ghdr-meta {
            font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary);
            display: flex; align-items: center; gap: 10px;
        }
        /* Line-movement chart icon (per-game header) */
        .chart-btn {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-secondary); cursor: pointer;
            width: 28px; height: 28px; border-radius: 6px;
            display: inline-flex; align-items: center; justify-content: center;
            transition: .15s; flex-shrink: 0;
        }
        .chart-btn:hover { color: var(--blue); border-color: var(--blue); background: rgba(74,124,255,0.08); }
        .chart-btn svg { width: 14px; height: 14px; }

        /* Chart modal */
        .chart-modal-bg {
            position: fixed; inset: 0; background: rgba(0,0,0,0.78);
            display: none; align-items: center; justify-content: center;
            z-index: 200; padding: 16px; backdrop-filter: blur(4px);
        }
        .chart-modal-bg.open { display: flex; }
        .chart-modal {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            width: 100%; max-width: 920px; max-height: 92vh; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .chart-hdr {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
        }
        .chart-hdr-title { font-size: 15px; font-weight: 700; color: var(--text); }
        .chart-hdr-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary); }
        .chart-close {
            background: none; border: none; color: var(--text-muted); cursor: pointer;
            font-size: 22px; line-height: 1; padding: 4px 10px; border-radius: 6px;
        }
        .chart-close:hover { color: var(--text); background: var(--surface-2); }
        .chart-controls {
            padding: 12px 18px; border-bottom: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 10px;
        }
        .chart-pill-row {
            display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
        }
        .chart-pill-row .label {
            font-family: 'JetBrains Mono', monospace; font-size: 10px;
            color: var(--text-muted); margin-right: 6px; letter-spacing: 0.05em;
        }
        .chart-pill {
            background: var(--surface-2); border: 1px solid var(--border);
            color: var(--text-secondary); padding: 5px 12px; border-radius: 6px;
            font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
            cursor: pointer; transition: .15s; user-select: none;
        }
        .chart-pill:hover { color: var(--text); border-color: var(--text-muted); }
        .chart-pill.active {
            background: var(--blue-dim); border-color: var(--blue); color: var(--blue);
        }
        .chart-pill.book.active { /* book pills color-code per book in JS */ }
        .chart-canvas-wrap {
            position: relative; padding: 18px; flex: 1; min-height: 320px;
        }
        .chart-empty {
            text-align: center; color: var(--text-muted); padding: 60px 20px;
            font-size: 14px;
        }
        @media (max-width: 700px) {
            .chart-hdr-title { font-size: 13px; }
            .chart-controls { padding: 10px 12px; }
            .chart-canvas-wrap { padding: 12px; min-height: 240px; }
            .chart-pill { padding: 4px 9px; font-size: 10px; }
        }
        .ghdr-league {
            font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted);
            background: var(--surface); padding: 3px 8px; border-radius: 4px; margin-right: 10px;
        }
        .ghdr.live { border-left: 4px solid var(--green); }
        .live-badge {
            font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
            color: var(--green); background: var(--green-dim); padding: 3px 10px;
            border-radius: 6px; margin-right: 8px; animation: live-pulse 1.5s infinite;
        }
        @keyframes live-pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
        .score-inline { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: var(--text); margin: 0 6px; letter-spacing: 1px; }
        .score-sep { color: var(--text-muted); margin: 0 3px; }
        .game-status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: var(--text-secondary);
            margin-left: 8px;
        }
        .stale-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            color: var(--orange);
            background: rgba(245,158,11,0.12);
            padding: 3px 8px;
            border-radius: 6px;
            margin-left: 8px;
        }
        /* Unified odds table */
        .odds-table { width: 100%; border-collapse: collapse; min-width: 700px; table-layout: fixed; }
        .odds-table th {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            padding: 8px 4px;
        }
        .odds-table td {
            padding: 0;
            border-bottom: 1px solid rgba(30,37,48,0.4);
            text-align: center;
            vertical-align: middle;
        }
        .odds-table tr:last-child td { border-bottom: none; }
        .odds-table td.team-name {
            text-align: left;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
        }
        .odds-table td.best-cell {
            padding: 8px;
            background: var(--blue-dim);
        }
        .odds-table td.book-cell {
            padding: 8px;
        }
        .odds-table td.book-cell-first {
            padding: 8px;
            border-left: 1px solid var(--border-light);
        }
        .odds-table td.best-cell-last {
            padding: 8px;
            background: var(--blue-dim);
            border-right: 2px solid var(--border-light);
        }
        /* Best line header */
        .th-best-label {
            text-align: left; padding: 10px 20px;
            font-size: 10px; color: var(--blue);
            background: var(--blue-dim); width: 180px;
        }
        .th-best-mkt {
            padding: 6px; font-size: 9px; font-weight: 600;
            color: var(--text-muted); background: rgba(11,14,19,0.5);
        }
        .th-best-mkt-last {
            padding: 6px; font-size: 9px; font-weight: 600;
            color: var(--text-muted); background: rgba(11,14,19,0.5);
            border-right: 2px solid var(--border-light);
        }
        /* Book name header */
        .th-book-name {
            padding: 8px 4px; font-size: 12px; font-weight: 700;
            color: var(--text-secondary); background: rgba(11,14,19,0.3);
            border-left: 1px solid var(--border-light);
        }
        /* Book sub-header (ML/SPR/TOT) */
        .th-book-mkt {
            padding: 3px; font-size: 8px; font-weight: 600;
            color: var(--text-muted); background: rgba(11,14,19,0.15);
        }
        .th-book-mkt-first {
            padding: 3px; font-size: 8px; font-weight: 600;
            color: var(--text-muted); background: rgba(11,14,19,0.15);
            border-left: 1px solid var(--border-light);
        }
        /* Empty sub-header cells for best section */
        .th-empty { background: transparent; }
        .th-empty-last { background: transparent; border-right: 2px solid var(--border-light); }

        /* Odds values */
        .odds-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px; font-weight: 700;
            line-height: 1.2;
        }
        .odds-val-book {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px; font-weight: 700;
            line-height: 1.2;
        }
        .odds-val.fav, .odds-val-book.fav { color: var(--orange); }
        .odds-val.dog, .odds-val-book.dog { color: var(--blue); }
        .odds-val.even, .odds-val-book.even { color: var(--text); }
        .odds-val.na, .odds-val-book.na { color: var(--text-muted); font-weight: 400; font-size: 12px; }
        .odds-point {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px; font-weight: 500;
            color: var(--text-secondary);
            display: block; margin-bottom: 2px;
        }
        .odds-book-attr {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px; font-weight: 600;
            color: var(--blue); display: block; margin-top: 1px;
        }
        .deep-link {
            font-size: 10px; color: var(--text-muted); text-decoration: none; margin-left: 4px;
            opacity: 0; transition: opacity 0.15s;
        }
        .th-book-name:hover .deep-link { opacity: 1; }

        /* Game footer (movement + splits) */
        .game-footer {
            background: rgba(11,14,19,0.4);
            border-top: 1px solid var(--border);
            padding: 0;
        }

        /* Movement bar */
        .movement-bar {
            display: flex; gap: 0; padding: 0;
            align-items: stretch;
            border-bottom: 1px solid rgba(30,37,48,0.3);
            background: linear-gradient(135deg, rgba(74,124,255,0.06) 0%, rgba(6,182,212,0.04) 100%);
        }
        .mv-src {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; font-weight: 700; color: var(--blue);
            background: var(--blue-dim); padding: 12px 16px;
            display: flex; align-items: center;
            border-right: 1px solid var(--border);
            letter-spacing: 0.5px;
        }
        .mv-items {
            display: flex; gap: 0; flex: 1; align-items: stretch;
        }
        .mv-item {
            font-family: 'JetBrains Mono', monospace;
            display: flex; align-items: center; gap: 6px;
            font-size: 14px; padding: 10px 20px;
            border-right: 1px solid rgba(30,37,48,0.3);
            flex: 1;
        }
        .mv-item:last-child { border-right: none; }
        .mv-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.5px;
            background: var(--surface-2); padding: 3px 8px; border-radius: 4px;
        }
        .mv-team { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
        .mv-open { color: var(--text-muted); font-size: 13px; }
        .mv-arrow { font-size: 16px; }
        .mv-current { font-weight: 700; font-size: 15px; }
        .mv-diff { font-size: 11px; }

        .empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); font-size: 14px; }
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Auth loading screen */
        .auth-loading {
            display: flex;
            align-items: center;

</head>
<body>
    <!-- Auth loading state -->
    <div class="auth-loading" id="auth-gate">
        <span class="spinner"></span> Authenticating...
    </div>

    <!-- Main app (hidden until auth) -->
    <div id="app" style="display:none;max-width:100vw;overflow-x:hidden">
        <div class="top-bar">
            <div class="top-bar-left">
                <div class="top-bar-logo">KH</div>
                <div class="top-bar-title">The Kahla House</div>
                <div class="nav-links">
                    <a href="/" class="nav-link">Home</a>
                    <a href="/odds" class="nav-link active">Odds</a>
                    <a href="/dashboard" class="nav-link admin-only" style="display:none">Dashboard</a>
                </div>
            </div>
            <div class="top-bar-right">
                <span class="status" id="status">Loading...</span>
                <button class="logout-btn" onclick="doLogout()">Logout</button>
            </div>
        </div>

        <div class="sport-bar" id="sport-bar"></div>

        <div class="toolbar">
            <input class="search-box" id="search" type="text" placeholder="Search team or matchup..." oninput="renderBoard()">
            <div class="books-btn-wrap">
                <button class="books-btn" onclick="toggleBooksPanel()">
                    Books <span class="cnt" id="books-cnt">0</span> &#9662;
                </button>
                <div class="books-panel" id="books-panel">
                    <div class="books-panel-header">
                        <span>Sportsbooks</span>
                        <button onclick="selectAllBooks()">All</button>
                        <button onclick="selectNoBooks()">None</button>
                    </div>
                    <div id="books-list"></div>
                </div>
            </div>
            <div class="active-books-summary" id="books-summary"></div>
            <span class="info" id="info"></span>
        </div>

        <div class="board-wrap">
            <div class="board" id="board">
                <div class="empty-state"><span class="spinner"></span> Loading odds...</div>
            </div>
            <div class="board" id="board-back" style="position:absolute;visibility:hidden;pointer-events:none"></div>
        </div>
    </div>

    <script>
    // ─── Firebase Auth Guard ───
    async function authFetch(url, options = {}) {
        const user = firebase.auth().currentUser;
        if (!user) { window.location.href = '/'; return null; }
        const token = await user.getIdToken();
        const headers = { ...(options.headers || {}), 'Authorization': 'Bearer ' + token };
        return fetch(url, { ...options, headers });
    }

    function doLogout() {
        firebase.auth().signOut().then(() => { window.location.href = '/'; });
    }

    firebase.auth().onAuthStateChanged(async user => {
        if (!user) {
            window.location.href = '/';
            return;
        }
        try {
            const token = await user.getIdToken();
            const r = await fetch('/api/me', { headers: { 'Authorization': 'Bearer ' + token } });
            if (!r.ok) { window.location.href = '/'; return; }
            const me = await r.json();
            if (!me.approved || (me.role !== 'admin' && me.role !== 'viewer')) { window.location.href = '/'; return; }
            if (me.role === 'admin') {
                document.querySelectorAll('.admin-only').forEach(el => { el.style.display = ''; });
            }
        } catch (e) { window.location.href = '/'; return; }
        document.getElementById('auth-gate').style.display = 'none';
        document.getElementById('app').style.display = '';
        initApp();
    });

    // ─── App Logic ───
    function initApp() {

    const $ = id => document.getElementById(id);
    // Sports the cron ingests (matches kahla-scanner SPORTS_ENABLED). NCAAF
    // and UFC included; Soccer and Tennis intentionally excluded — empty data.
    const SPORTS = ['mlb','nba','nhl','nfl','ncaab','ncaaf','mma'];
    const SL = {mlb:'MLB',nba:'NBA',nhl:'NHL',nfl:'NFL',ncaab:'NCAAB',ncaaf:'NCAAF',mma:'MMA'};
    // Books the Odds API allowlist surfaces (matches _ALLOWED_BOOKS in app.py).
    const BL = {pinnacle:'PIN',draftkings:'DK',fanduel:'FD',betmgm:'MGM',caesars:'CZR',hardrock:'HR',betonline:'BOL'};
    const BL_FULL = {pinnacle:'Pinnacle',draftkings:'DraftKings',fanduel:'FanDuel',betmgm:'BetMGM',caesars:'Caesars',hardrock:'Hard Rock',betonline:'BetOnline'};

    let activeSport = 'mlb';  // will be overridden by Firestore prefs
    let oddsData = {events:[], books:[]};
    let currentOpeners = {};
    const DEFAULT_BOOKS = ['fanduel','draftkings','betmgm','pinnacle','caesars'];
    let enabledBooks = new Set(DEFAULT_BOOKS);  // will be overridden by Firestore prefs

    const LEAGUE_FILTER = {
        mlb: ['MLB'],
        nba: ['NBA'],
        nhl: ['NHL'],
        nfl: ['NFL'],
    };

    function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
    function fmt(p){if(p==null)return '--';return p>0?'+'+p:''+p}
    function cls(p){if(p==null)return 'na';if(p<-130)return 'fav';if(p>130)return 'dog';return 'even'}

    // --- Opening line tracker (API-backed) ---

    /* Scanner-backed first-seen openers (Phase 4).
       The 5-min Owls cron writes book_snapshots to Supabase. The earliest
       PIN/CIR snapshot per (market_type, side) is the genuine opener —
       better than the legacy Firestore "first time the user opened the
       page" capture. We merge these over Firestore openers in `currentOpeners`
       on each sport switch + after each odds load. */
    let scannerOpeners = [];  // array of {home, away, commence, opener}

    async function loadScannerOpeners(sport) {
        try {
            const resp = await authFetch(`/api/openers/scanner?sport=${sport}`);
            if (!resp) return [];
            const data = await resp.json();
            return (data.ok && Array.isArray(data.events)) ? data.events : [];
        } catch { return []; }
    }

    function _matchScannerEvent(scannerEvts, ev) {
        const eAway = (ev.away_team || '').toLowerCase();
        const eHome = (ev.home_team || '').toLowerCase();
        const eStart = ev.commence_time ? new Date(ev.commence_time).getTime() : 0;
        for (const s of scannerEvts) {
            const sAway = (s.away || '').toLowerCase();
            const sHome = (s.home || '').toLowerCase();
            const sStart = s.commence ? new Date(s.commence).getTime() : 0;
            if (eStart && sStart && Math.abs(eStart - sStart) > 30 * 60 * 1000) continue;
            if (!eAway || !eHome || !sAway || !sHome) continue;
            // Exact (post-lowercase) or substring containment in either direction.
            // Owls and the scanner both pull from the same source so exact match
            // is the common case; substring covers minor team-name suffix drift.
            if (eAway === sAway && eHome === sHome) return s;
            if ((eAway.includes(sAway) || sAway.includes(eAway)) &&
                (eHome.includes(sHome) || sHome.includes(eHome))) return s;
        }
        return null;
    }

    /* Mutates `currentOpeners` in place. Scanner data wins; Firestore fills gaps. */
    function mergeScannerOpenersInto(events) {
        if (!scannerOpeners.length) return;
        for (const ev of (events || [])) {
            const eid = ev.numeric_id || ev.id;
            if (!eid) continue;
            const s = _matchScannerEvent(scannerOpeners, ev);
            if (!s) continue;
            const fb = currentOpeners[eid] || { ml: {}, spread: {}, total: {} };
            currentOpeners[eid] = {
                ml:     { ...(fb.ml     || {}), ...(s.opener.ml     || {}) },
                spread: { ...(fb.spread || {}), ...(s.opener.spread || {}) },
                total:  { ...(fb.total  || {}), ...(s.opener.total  || {}) },
                src:    s.opener.src || fb.src,
            };
        }
    }

    async function loadOpeners(sport) {
        try {
            const resp = await authFetch(`/api/openers?sport=${sport}`);
            if (!resp) return {};
            const data = await resp.json();
            if (data.ok) return data.events || {};
            return {};
        } catch { return {}; }
    }

    async function saveOpenersAPI(sport, openers) {
        try {
            await authFetch('/api/openers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sport, events: openers })
            });
        } catch(e) { console.warn('saveOpeners:', e); }
    }

    async function captureOpeners(events, sport) {
        const openers = currentOpeners;
        let changed = false;
        for (const ev of events) {
            const eid = ev.numeric_id || ev.id;
            if (!eid || openers[eid]) continue;
            const pin = (ev.books || {}).pinnacle || (ev.books || {}).circa;
            const srcBook = (ev.books||{}).pinnacle ? 'PIN' : (ev.books||{}).circa ? 'CIR' : null;
            if (!pin || !srcBook) continue;
            const o = { ml: {}, spread: {}, total: {}, src: srcBook };
            for (const [team, price] of Object.entries(pin.moneyline || {})) {
                if (price != null) o.ml[team] = price;
            }
            for (const [team, data] of Object.entries(pin.spread || {})) {
                if (data?.price != null) o.spread[team] = { price: data.price, point: data.point };
            }
            for (const [side, data] of Object.entries(pin.total || {})) {
                if (data?.price != null) o.total[side] = { price: data.price, point: data.point };
            }
            if (Object.keys(o.ml).length || Object.keys(o.spread).length) {
                openers[eid] = o;
                changed = true;
            }
        }
        // Backfill: if an existing opener is missing any market, fill from the best available book
        for (const ev of events) {
            const eid = ev.numeric_id || ev.id;
            if (!eid || !openers[eid]) continue;
            const o = openers[eid];
            const hasML = Object.keys(o.ml || {}).length;
            const hasSpr = Object.keys(o.spread || {}).length;
            const hasTot = Object.keys(o.total || {}).length;
            if (hasML && hasSpr && hasTot) continue;
            const bks = ev.books || {};
            const chain = [bks.pinnacle, bks.circa].filter(Boolean);
            const findWith = (mkt) => chain.find(b => Object.keys(b[mkt] || {}).length);
            if (!hasML) {
                const b = findWith('moneyline');
                if (b) { if (!o.ml) o.ml = {}; for (const [t, p] of Object.entries(b.moneyline)) { if (p != null) o.ml[t] = p; } if (Object.keys(o.ml).length) changed = true; }
            }
            if (!hasSpr) {
                const b = findWith('spread');
                if (b) { if (!o.spread) o.spread = {}; for (const [t, d] of Object.entries(b.spread)) { if (d?.price != null) o.spread[t] = { price: d.price, point: d.point }; } if (Object.keys(o.spread).length) changed = true; }
            }
            if (!hasTot) {
                const b = findWith('total');
                if (b) { if (!o.total) o.total = {}; for (const [t, d] of Object.entries(b.total)) { if (d?.price != null) o.total[t] = { price: d.price, point: d.point }; } if (Object.keys(o.total).length) changed = true; }
            }
        }
        if (changed) {
            currentOpeners = openers;
            saveOpenersAPI(sport, openers);
        }
        return openers;
    }


    /* Note: a `prefetchOpeners()` function used to live here. It hit
       /api/odds for every other sport on first page load of the day to
       seed Firestore with current odds as "openers." That's now redundant
       — `/api/openers/scanner` returns the actual earliest-captured PIN/CIR
       lines from the 5-min Owls cron, which is a better signal than
       "what the line was the first time someone refreshed the page." */

    function localTime(s){
        if(!s)return '';
        try{const d=new Date(s);if(isNaN(d))return '';return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}catch{return ''}
    }
    function localDate(s){
        if(!s)return '';
        try{const d=new Date(s);if(isNaN(d))return '';return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}catch{return ''}
    }

    function renderSportBar(){
        let h='';
        for(const s of SPORTS) h+=`<div class="stab ${s===activeSport?'active':''}" onclick="setSport('${s}')">${SL[s]||s.toUpperCase()}</div>`;
        $('sport-bar').innerHTML=h;
    }

    // Book order: user-defined order, persisted
    let bookOrder = [];

    // Debounced save to Firestore
    let _prefsSaveTimer = null;
    function saveBookPrefs(){
        clearTimeout(_prefsSaveTimer);
        _prefsSaveTimer = setTimeout(() => {
            authFetch('/api/preferences', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({preferences: {
                    odds_books: [...enabledBooks],
                    odds_book_order: bookOrder,
                }})
            }).catch(e => console.error('Failed to save book prefs:', e));
        }, 500);
    }

    // All known book keys (superset — user order + API-returned + enabled)
    const ALL_KNOWN_BOOKS = ['pinnacle','draftkings','fanduel','betmgm','caesars','hardrock','betonline'];

    function getOrderedBooks(){
        // The book selector only ever shows books in ALL_KNOWN_BOOKS — that
        // matches the server-side _ALLOWED_BOOKS allowlist. Stale Firestore
        // preferences from the Owls era (POLY/NOV/KAL/STN/etc) are silently
        // dropped. Random Odds API EU books that leak into responses are
        // also dropped from the selector.
        const allowed = new Set(ALL_KNOWN_BOOKS);
        const ordered = [];
        const seen = new Set();
        // Respect user's custom order, but only for books that are still allowed
        for(const b of bookOrder) { if(allowed.has(b) && !seen.has(b)) { ordered.push(b); seen.add(b); } }
        // Append any known books not yet in the order
        for(const b of ALL_KNOWN_BOOKS) { if(!seen.has(b)) { ordered.push(b); seen.add(b); } }
        bookOrder = ordered;
        return ordered;
    }

    function getBooks(){
        return getOrderedBooks().filter(b=>enabledBooks.has(b));
    }

    /* Compare current PIN line vs the captured opener for each market.
       PIN-only post-Owls. Returns null if no PIN data or no opener stored.
       Includes a JIT backfill: if the saved opener is missing a market
       (e.g. game tracked since before that market opened), we accept the
       current PIN line as the opener for that one market. */
    function computeMovement(ev, openers) {
        const eid = ev.numeric_id || ev.id;
        const opener = openers[eid];
        if (!opener) return null;
        const pin = (ev.books || {}).pinnacle;
        if (!pin) return null;
        const src = opener.src || 'PIN';

        // JIT backfill of missing markets
        if (!Object.keys(opener.ml || {}).length && Object.keys(pin.moneyline || {}).length) {
            opener.ml = opener.ml || {};
            for (const [t, p] of Object.entries(pin.moneyline)) if (p != null) opener.ml[t] = p;
        }
        if (!Object.keys(opener.spread || {}).length && Object.keys(pin.spread || {}).length) {
            opener.spread = opener.spread || {};
            for (const [t, d] of Object.entries(pin.spread)) if (d?.price != null) opener.spread[t] = { price: d.price, point: d.point };
        }
        if (!Object.keys(opener.total || {}).length && Object.keys(pin.total || {}).length) {
            opener.total = opener.total || {};
            for (const [s, d] of Object.entries(pin.total)) if (d?.price != null) opener.total[s] = { price: d.price, point: d.point };
        }

        const mv = { ml: {}, spread: {}, total: {}, src };
        for (const [team, curPrice] of Object.entries(pin.moneyline || {})) {
            const openPrice = opener.ml?.[team];
            if (openPrice != null && curPrice != null) {
                mv.ml[team] = { open: openPrice, current: curPrice, diff: curPrice - openPrice };
            }
        }
        for (const [team, cur] of Object.entries(pin.spread || {})) {
            const op = opener.spread?.[team];
            if (op && cur?.price != null) {
                mv.spread[team] = {
                    open_price: op.price, open_point: op.point,
                    current_price: cur.price, current_point: cur.point,
                    point_diff: (cur.point || 0) - (op.point || 0),
                    price_diff: cur.price - op.price,
                };
            }
        }
        for (const [side, cur] of Object.entries(pin.total || {})) {
            const op = opener.total?.[side];
            if (op && cur?.price != null) {
                mv.total[side] = {
                    open_price: op.price, open_point: op.point,
                    current_price: cur.price, current_point: cur.point,
                    point_diff: (cur.point || 0) - (op.point || 0),
                    price_diff: cur.price - op.price,
                };
            }
        }
        return mv;
    }

    function renderBookPills(){
        const ordered = getOrderedBooks();
        const enabled = getBooks();
        $('books-cnt').textContent = enabled.length;

        let sh='';
        for(const b of enabled) sh+=`<span class="abs-chip">${esc(BL[b]||b)}</span>`;
        $('books-summary').innerHTML=sh;

        let h='';
        for(let i=0;i<ordered.length;i++){
            const b = ordered[i];
            const on = enabledBooks.has(b);
            const full = BL_FULL[b]||b;
            const abbr = BL[b]||b;
            h+=`<div class="book-item" data-book="${b}">`;
            h+=`<button class="move-btn" onclick="moveBook('${b}',-1)" ${i===0?'disabled':''}>&#9650;</button>`;
            h+=`<button class="move-btn" onclick="moveBook('${b}',1)" ${i===ordered.length-1?'disabled':''}>&#9660;</button>`;
            h+=`<input type="checkbox" ${on?'checked':''} onchange="toggleBook('${b}')">`;
            h+=`<span class="book-label">${esc(full)}<span class="book-abbr">${esc(abbr)}</span></span>`;
            h+=`</div>`;
        }
        $('books-list').innerHTML=h;
    }

    // Expose to global scope for onclick handlers
    window.toggleBook = function(b){
        if(enabledBooks.has(b)) enabledBooks.delete(b); else enabledBooks.add(b);
        saveBookPrefs();
        renderBookPills();
        renderBoard();
    };

    window.selectAllBooks = function(){
        enabledBooks = new Set(getOrderedBooks());
        saveBookPrefs(); renderBookPills(); renderBoard();
    };
    window.selectNoBooks = function(){
        enabledBooks = new Set();
        saveBookPrefs(); renderBookPills(); renderBoard();
    };

    window.moveBook = function(b, dir){
        const i = bookOrder.indexOf(b);
        if(i<0) return;
        const ni = i+dir;
        if(ni<0||ni>=bookOrder.length) return;
        bookOrder.splice(i,1);
        bookOrder.splice(ni,0,b);
        saveBookPrefs(); renderBookPills(); renderBoard();
    };

    let booksPanelOpen = false;
    window.toggleBooksPanel = function(){
        booksPanelOpen = !booksPanelOpen;
        $('books-panel').classList.toggle('open', booksPanelOpen);
    };
    document.addEventListener('click', e=>{
        if(booksPanelOpen && !e.target.closest('.books-btn-wrap')){
            booksPanelOpen=false;
            $('books-panel').classList.remove('open');
        }
    });

    function truncTeam(name) {
        if (!name) return '';
        const up = name.toUpperCase();
        if (up === 'OVER') return 'OVR';
        if (up === 'UNDER') return 'UND';
        return up.substring(0,3);
    }


    function renderMovement(mv, label, mktKey, awayName, homeName) {
        const data = mv[mktKey] || {};
        const awayData = data[awayName];
        if (!awayData) return '';

        let h = `<span class="mv-item"><span class="mv-label">${label}</span>`;

        if (mktKey === 'ml') {
            const diff = awayData.diff;
            const arrow = diff > 0 ? '&#9650;' : diff < 0 ? '&#9660;' : '';
            const color = diff > 0 ? 'var(--green)' : diff < 0 ? 'var(--red)' : 'var(--text-secondary)';
            h += `<span class="mv-team">${esc(truncTeam(awayName))}</span>`;
            h += `<span class="mv-open">${fmt(awayData.open)}</span>`;
            h += `<span class="mv-arrow" style="color:${color}">${arrow}</span>`;
            h += `<span class="mv-current" style="color:${color}">${fmt(awayData.current)}</span>`;
            if (diff !== 0) h += `<span class="mv-diff" style="color:${color}">(${diff > 0 ? '+' : ''}${diff})</span>`;
        } else if (mktKey === 'spread') {
            const ptDiff = awayData.point_diff;
            const pxDiff = awayData.price_diff;
            const changed = ptDiff !== 0 || pxDiff !== 0;
            const pt = awayData.current_point;
            const ptStr = pt > 0 ? '+' + pt : '' + pt;
            const openPt = awayData.open_point;
            const openPtStr = openPt > 0 ? '+' + openPt : '' + openPt;
            // Color based on direction: line moving in bettor's favor (more points) = green
            const color = ptDiff > 0 ? 'var(--green)' : ptDiff < 0 ? 'var(--red)' : pxDiff !== 0 ? 'var(--orange)' : 'var(--text-secondary)';
            const arrow = ptDiff > 0 ? '&#9650;' : ptDiff < 0 ? '&#9660;' : pxDiff !== 0 ? (pxDiff > 0 ? '&#9650;' : '&#9660;') : '';
            h += `<span class="mv-team">${esc(truncTeam(awayName))}</span>`;
            h += `<span class="mv-open">${openPtStr} ${fmt(awayData.open_price)}</span>`;
            h += `<span class="mv-arrow" style="color:${color}">${arrow}</span>`;
            h += `<span class="mv-current" style="color:${color}">${ptStr} ${fmt(awayData.current_price)}</span>`;
            if (ptDiff !== 0) h += `<span class="mv-diff" style="color:${color}">(${ptDiff > 0 ? '+' : ''}${ptDiff})</span>`;
        } else if (mktKey === 'total') {
            const ptDiff = awayData.point_diff;
            const pxDiff = awayData.price_diff;
            const changed = ptDiff !== 0 || pxDiff !== 0;
            const color = ptDiff > 0 ? 'var(--red)' : ptDiff < 0 ? 'var(--green)' : pxDiff !== 0 ? 'var(--orange)' : 'var(--text-secondary)';
            const arrow = ptDiff > 0 ? '&#9650;' : ptDiff < 0 ? '&#9660;' : pxDiff !== 0 ? (pxDiff > 0 ? '&#9650;' : '&#9660;') : '';
            h += `<span class="mv-open">O ${awayData.open_point} ${fmt(awayData.open_price)}</span>`;
            h += `<span class="mv-arrow" style="color:${color}">${arrow}</span>`;
            h += `<span class="mv-current" style="color:${color}">O ${awayData.current_point} ${fmt(awayData.current_price)}</span>`;
            if (ptDiff !== 0) h += `<span class="mv-diff" style="color:${color}">(${ptDiff > 0 ? '+' : ''}${ptDiff})</span>`;
        }

        h += `</span>`;
        return h;
    }

    function findBestOdds(ev, books, away, home) {
        const result = {
            ml_away: null, ml_home: null,
            spr_away: null, spr_home: null,
            tot_over: null, tot_under: null,
        };

        for (const bk of books) {
            const bd = (ev.books || {})[bk];
            if (!bd) continue;
            const label = BL[bk] || bk;

            const mla = bd.moneyline?.[away];
            if (mla != null && (result.ml_away == null || mla > result.ml_away.price))
                result.ml_away = { price: mla, book: label };

            const mlh = bd.moneyline?.[home];
            if (mlh != null && (result.ml_home == null || mlh > result.ml_home.price))
                result.ml_home = { price: mlh, book: label };

            const spa = bd.spread?.[away];
            if (spa?.price != null) {
                if (result.spr_away == null ||
                    spa.point > result.spr_away.point ||
                    (spa.point === result.spr_away.point && spa.price > result.spr_away.price))
                    result.spr_away = { price: spa.price, point: spa.point, book: label };
            }

            const sph = bd.spread?.[home];
            if (sph?.price != null) {
                if (result.spr_home == null ||
                    sph.point > result.spr_home.point ||
                    (sph.point === result.spr_home.point && sph.price > result.spr_home.price))
                    result.spr_home = { price: sph.price, point: sph.point, book: label };
            }

            const tov = bd.total?.['Over'];
            if (tov?.price != null) {
                if (result.tot_over == null ||
                    (tov.point === result.tot_over.point && tov.price > result.tot_over.price) ||
                    (tov.point < result.tot_over.point))
                    result.tot_over = { price: tov.price, point: tov.point, book: label };
            }

            const tun = bd.total?.['Under'];
            if (tun?.price != null) {
                if (result.tot_under == null ||
                    (tun.point === result.tot_under.point && tun.price > result.tot_under.price) ||
                    (tun.point > result.tot_under.point))
                    result.tot_under = { price: tun.price, point: tun.point, book: label };
            }
        }
        return result;
    }

    function bestCell(b, isLast) {
        const tdClass = isLast ? 'best-cell-last' : 'best-cell';
        if (!b) return `<td class="${tdClass}"><span class="odds-val na">--</span></td>`;
        return `<td class="${tdClass}"><span class="odds-val ${cls(b.price)}">${fmt(b.price)}</span><span class="odds-book-attr">${esc(b.book)}</span></td>`;
    }

    function bestCellPt(b, prefix, isLast) {
        const tdClass = isLast ? 'best-cell-last' : 'best-cell';
        if (!b) return `<td class="${tdClass}"><span class="odds-val na">--</span></td>`;
        const ptStr = prefix
            ? `${prefix} ${b.point}`
            : (b.point > 0 ? '+' + b.point : '' + b.point);
        return `<td class="${tdClass}"><span class="odds-point">${ptStr}</span><span class="odds-val ${cls(b.price)}">${fmt(b.price)}</span><span class="odds-book-attr">${esc(b.book)}</span></td>`;
    }

    function hasAnyOdds(ev, books) {
        for (const bk of books) {
            const bd = (ev.books || {})[bk];
            if (!bd) continue;
            if (Object.keys(bd.moneyline || {}).length) return true;
            if (Object.keys(bd.spread || {}).length) return true;
            if (Object.keys(bd.total || {}).length) return true;
        }
        return false;
    }

    window.renderBoard = function renderBoard(){
        const board=$('board');
        const query=($('search').value||'').toLowerCase().trim();
        let events=(oddsData.events||[]);
        const books=getBooks();

        const leagueFilter = LEAGUE_FILTER[activeSport];
        if (leagueFilter) {
            events = events.filter(e => {
                const lg = (e.league || '').toUpperCase();
                if (!lg) return false;
                return leagueFilter.some(f => lg.includes(f));
            });
        }

        if (query) events = events.filter(e => (e.home_team + ' ' + e.away_team).toLowerCase().includes(query));

        // Show every game the API returned. Don't filter on book coverage —
        // sharp books often delay posting evening lines, and a game with no
        // odds at all should still appear (with empty cells) so the user
        // knows it exists. Log the raw count so we can tell when Owls
        // itself is short-changing us vs a client filter problem.
        const rawCount = (oddsData.events || []).length;
        if (rawCount !== events.length) {
            console.log('[odds] sport=' + activeSport + ' raw=' + rawCount + ' afterLeagueFilter=' + events.length);
        }

        if(!events.length){
            const msg=oddsData.meta_message?esc(oddsData.meta_message):'No games found';
            board.innerHTML=`<div class="empty-state">${query?'No matches for "'+esc(query)+'"':msg}</div>`;
            $('info').textContent='';
            return;
        }
        $('info').textContent = events.length + ' games' + (rawCount !== events.length ? ' (' + (rawCount - events.length) + ' filtered)' : '');

        let h='';
        for(const ev of events){
            const home=ev.home_team||'';
            const away=ev.away_team||'';
            const time=localTime(ev.commence_time);

            const best = findBestOdds(ev, books, away, home);

            h+=`<div class="game">`;

            // === GAME HEADER ===
            // Live games show a LIVE badge and a "closing line" tag because
            // we freeze the displayed odds at event_start (mid-game retail
            // twitches were causing whiplash). The chart still has full
            // history if you want to see the live movement.
            const chartBtn = `<button class="chart-btn js-chart-btn" title="Line movement"
                data-sport="${esc(activeSport)}"

                data-away="${esc(away)}"

                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 17 9 11 13 15 21 7"/><polyline points="14 7 21 7 21 14"/></svg>
            </button>`;

            h+=`<div class="ghdr${isLive ? ' live' : ''}">`;

            // === UNIFIED ODDS TABLE ===

            // Colgroup for fixed column widths
            h+=`<colgroup><col style="width:160px">`;  // team name
            h+=`<col style="width:70px"><col style="width:70px"><col style="width:70px">`;  // best ML/SPR/TOT
            for(let _b=0;_b<books.length;_b++) h+=`<col style="width:62px"><col style="width:62px"><col style="width:62px">`;
            h+=`</colgroup><thead>`;

            // First header row: Best Line label + best ML/SPR/TOT + book names

            // Second header row: empty cells for best section + ML/SPR/TOT sub-headers per book
            h+=`<tr>`;
            h+=`<th class="th-empty"></th>`;
            h+=`<th class="th-empty"></th>`;
            h+=`<th class="th-empty"></th>`;
            h+=`<th class="th-empty-last"></th>`;
            for(const bk of books){
                h+=`<th class="th-book-mkt-first">ML</th><th class="th-book-mkt">SPR</th><th class="th-book-mkt">TOT</th>`;
            }

            // Away row
            h+=`<tr>`;
            h+=`<td class="team-name">${esc(away)}</td>`;
            h+=bestCell(best.ml_away);
            h+=bestCellPt(best.spr_away);
            h+=bestCellPt(best.tot_over, 'O', true);
            for(const bk of books){
                const bd=(ev.books||{})[bk]||{};
                const ml=bd.moneyline?.[away];
                h+=`<td class="book-cell-first"><span class="odds-val-book ${ml!=null?cls(ml):'na'}">${fmt(ml)}</span></td>`;
                const sp=bd.spread?.[away];
                if(sp){h+=`<td class="book-cell"><span class="odds-point">${sp.point>0?'+'+sp.point:sp.point}</span><span class="odds-val-book ${cls(sp.price)}">${fmt(sp.price)}</span></td>`}
                else{h+=`<td class="book-cell"><span class="odds-val-book na">--</span></td>`}

            h+=`<tr>`;
            h+=`<td class="team-name">${esc(home)}</td>`;
            h+=bestCell(best.ml_home);
            h+=bestCellPt(best.spr_home);
            h+=bestCellPt(best.tot_under, 'U', true);
            for(const bk of books){
                const bd=(ev.books||{})[bk]||{};
                const ml=bd.moneyline?.[home];
                h+=`<td class="book-cell-first"><span class="odds-val-book ${ml!=null?cls(ml):'na'}">${fmt(ml)}</span></td>`;
                const sp=bd.spread?.[home];
                if(sp){h+=`<td class="book-cell"><span class="odds-point">${sp.point>0?'+'+sp.point:sp.point}</span><span class="odds-val-book ${cls(sp.price)}">${fmt(sp.price)}</span></td>`}
                else{h+=`<td class="book-cell"><span class="odds-val-book na">--</span></td>`}
                const tot=bd.total?.['Under'];
                if(tot){h+=`<td class="book-cell"><span class="odds-point">U ${tot.point}</span><span class="odds-val-book ${cls(tot.price)}">${fmt(tot.price)}</span></td>`}
                else{h+=`<td class="book-cell"><span class="odds-val-book na">--</span></td>`}
            }
            h+=`</tr></tbody></table></div>`;

            // === FOOTER: Movement bar (splits + RLM removed when Owls retired) ===
            const mv = computeMovement(ev, currentOpeners) || {};
            const hasMv = Object.keys(mv.ml||{}).length || Object.keys(mv.spread||{}).length;

            if (hasMv) {
                h += `<div class="game-footer">`;
                h += `<div class="movement-bar">`;
                h += `<span class="mv-src">${mv.src || 'PIN'}</span>`;
                h += `<div class="mv-items">`;
                h += renderMovement(mv, 'ML', 'ml', away, home);
                h += renderMovement(mv, 'SPR', 'spread', away, home);
                h += renderMovement(mv, 'TOT', 'total', 'Over', 'Under');
                h += `</div></div>`;
                h += `</div>`;
            }

            h+=`</div>`;
        }
        // Double-buffer: render into hidden back-board, then swap instantly
        const back = $('board-back');
        back.innerHTML = h;
        const scrollY = window.scrollY;
        // Swap: make back visible, hide front, then swap IDs
        requestAnimationFrame(() => {
            board.style.visibility = 'hidden';
            board.style.position = 'absolute';
            board.style.pointerEvents = 'none';
            back.style.visibility = '';
            back.style.position = '';
            back.style.pointerEvents = '';
            // Swap IDs so next render targets the now-hidden one
            board.id = 'board-back';
            back.id = 'board';
            window.scrollTo(0, scrollY);
        });
    }

    let firstLoad = true;
    async function loadOdds(showLoading){
        const status=$('status');
        if(showLoading || firstLoad){
            status.textContent='Loading...';
            status.className='status loading';
        }
        try{
            const resp=await authFetch(`/api/odds?sport=${activeSport}`);
            if (!resp) return;
            const data=await resp.json();
            if(!data.ok){
                status.textContent=data.error||'Error';
                status.className='status error';
                if(firstLoad) $('board').innerHTML=`<div class="empty-state">${esc(data.error||'API error')}</div>`;
                return;
            }
            // Only re-render if the game list changed (new games, removed games, score state change)
            // Price-only changes don't warrant a full DOM rebuild
            const gameKey = JSON.stringify((data.events||[]).map(e => e.id + '|' + (e.score?.live||'') + '|' + (e.score?.away_score||'') + '|' + (e.score?.home_score||'')));
            const gamesChanged = gameKey !== window._lastGameKey;
            window._lastGameKey = gameKey;
            oddsData=data;
            if (firstLoad) {
                // Allow fade-in animation on first load, then disable for subsequent renders
                setTimeout(() => {
                    document.querySelectorAll('.board-wrap').forEach(el => el.classList.add('no-animate'));
                }, 600);
            }
            firstLoad=false;
            // Don't overwrite user's book selection when switching sports.
            // Just track what books are available for rendering — enabledBooks stays as user chose.
            // Capture opening lines for today (Firestore-backed legacy capture).
            currentOpeners = await captureOpeners(data.events||[], activeSport);
            // Then merge scanner-backed openers on top — these are the genuine
            // earliest-seen lines from the 5-min Owls cron, and override the
            // legacy "first time the user opened the page" Firestore values.
            mergeScannerOpenersInto(data.events || []);
            const n=(data.events||[]).length;
            const t=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit'});
            status.textContent=`${n} games \u00b7 ${t}`;
            status.className='status';
            renderBookPills();
            if (gamesChanged) renderBoard();
        }catch(err){
            if(firstLoad){
                status.textContent='Fetch error';
                status.className='status error';
            }
            console.error(err);
        }
    }

    window.setSport = function(s){
        activeSport=s;
        firstLoad=true;
        authFetch('/api/preferences', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({preferences: {odds_sport: s}})
        }).catch(e => console.error('Failed to save sport pref:', e));
        renderSportBar();
        // Splits/SHARP-RLM removed when Owls was retired. Just openers + scanner-backed openers.
        Promise.all([
            loadOpeners(s),
            loadScannerOpeners(s),
        ]).then(([op, scnOps]) => {
            currentOpeners = op;
            scannerOpeners = scnOps;
            loadOdds(true);
        });
    };

    // Load user preferences from Firestore, then start the app
    async function loadAndStart() {
        try {
            const resp = await authFetch('/api/preferences');
            if (resp) {
                const data = await resp.json();
                if (data.ok && data.preferences) {
                    const p = data.preferences;
                    if (p.odds_sport) activeSport = p.odds_sport;
                    if (Array.isArray(p.odds_books) && p.odds_books.length) enabledBooks = new Set(p.odds_books);
                    if (Array.isArray(p.odds_book_order)) bookOrder = p.odds_book_order;
                }
            }
        } catch(e) {
            console.error('Failed to load preferences:', e);
        }

        renderSportBar();
        const [op, scnOps] = await Promise.all([
            loadOpeners(activeSport),
            loadScannerOpeners(activeSport),
        ]);
        currentOpeners = op;
        scannerOpeners = scnOps;
        await loadOdds();
        // No more user-side polling — odds are written by the 15-min cron and
        // the page reads from Supabase on each load. Pull-to-refresh to update.
        // Keep a slow refresh (90s) for users who leave the tab open during
        // a session — cheap since /api/odds reads cached Supabase data, no
        // external API hits.
        setInterval(loadOdds, 90000);
    }
    loadAndStart();

    <script>
    /* ─── Line-movement chart logic (separate scope from initApp) ─── */
    (function(){
        // Default-on is just PIN (the sharp anchor). The rest are toggles.
        // Circa removed entirely — not in The Odds API since the Owls swap.
        const CHART_BOOKS = [
            { code: 'PIN', label: 'PIN', color: '#fbbf24', defaultOn: true  },
            { code: 'DK',  label: 'DK',  color: '#22c55e', defaultOn: false },
            { code: 'FD',  label: 'FD',  color: '#06b6d4', defaultOn: false },
            { code: 'MGM', label: 'MGM', color: '#a855f7', defaultOn: false },
            { code: 'CAE', label: 'CAE', color: '#f97316', defaultOn: false },
            { code: 'HR',  label: 'HR',  color: '#ec4899', defaultOn: false },
            { code: 'BOL', label: 'BOL', color: '#84cc16', defaultOn: false },
        ];

        const state = {
            sport: null, home: '', away: '', commence: '',
            market: 'ml',
            side: 'home',  // 'home'|'away' for ml/spread, 'over'|'under' for total
            span: '12h',
            enabled: new Set(CHART_BOOKS.filter(b=>b.defaultOn).map(b=>b.code)),
            data: null,
            chart: null,
            inflight: 0,
        };

        function sidesForMarket(market) {
            return market === 'total' ? ['over', 'under'] : ['away', 'home'];
        }
        function defaultSide(market) {
            return market === 'total' ? 'over' : 'home';
        }
        function sideLabel(market, side) {
            if (market === 'total') return side === 'over' ? 'Over' : 'Under';
            return side === 'home' ? state.home : state.away;
        }

        function buildSidePills() {
            const row = document.getElementById('chartSideRow');
            while (row.children.length > 1) row.removeChild(row.lastChild);
            for (const side of sidesForMarket(state.market)) {
                const btn = document.createElement('button');
                btn.className = 'chart-pill' + (state.side === side ? ' active' : '');
                btn.textContent = sideLabel(state.market, side);
                btn.dataset.side = side;
                btn.onclick = () => { state.side = side; buildSidePills(); renderChart(); };
                row.appendChild(btn);
            }
        }

        function bookByCode(code) { return CHART_BOOKS.find(b => b.code === code); }

        // American odds <-> implied probability (with vig). Used to plot on
        // a continuous probability Y axis instead of the discontinuous
        // American-odds scale (where +100 and -100 are the same 50% point
        // separated by a 200-cent visual cliff).
        function americanToProb(price) {
            if (price == null || !Number.isFinite(price)) return null;
            if (price > 0) return 100 / (price + 100);
            if (price < 0) return -price / (-price + 100);
            return 0.5;
        }
        function probToAmerican(p) {
            if (!Number.isFinite(p) || p <= 0 || p >= 1) return null;
            return p >= 0.5
                ? Math.round(-p / (1 - p) * 100)
                : Math.round((1 - p) / p * 100);
        }
        function fmtAmerican(v) {
            if (v == null || !Number.isFinite(v)) return '--';
            return v > 0 ? '+' + v : '' + v;
        }

        function buildBookPills() {
            const row = document.getElementById('chartBooksRow');
            // Remove all but the first child (the LABEL span)
            while (row.children.length > 1) row.removeChild(row.lastChild);
            for (const b of CHART_BOOKS) {
                const btn = document.createElement('button');
                btn.className = 'chart-pill book' + (state.enabled.has(b.code) ? ' active' : '');
                btn.textContent = b.label;
                btn.style.borderColor = state.enabled.has(b.code) ? b.color : '';
                btn.style.color = state.enabled.has(b.code) ? b.color : '';
                btn.style.background = state.enabled.has(b.code) ? (b.color + '22') : '';
                btn.onclick = () => toggleBook(b.code);
                row.appendChild(btn);
            }
        }

        function setActivePill(rowId, attr, value) {
            document.querySelectorAll('#' + rowId + ' .chart-pill').forEach(el => {
                el.classList.toggle('active', el.dataset[attr] === value);
            });
        }

        window.setChartMarket = function(m) {
            state.market = m;
            // Switching market may invalidate the current side (e.g. from
            // 'home' to a Total chart) — reset to the market's default side.
            if (!sidesForMarket(m).includes(state.side)) {
                state.side = defaultSide(m);
            }
            setActivePill('chartMarketRow', 'market', m);
            buildSidePills();
            fetchAndRender();
        };
        window.setChartSpan = function(s) {
            state.span = s;
            setActivePill('chartSpanRow', 'span', s);
            fetchAndRender();
        };
        function toggleBook(code) {
            if (state.enabled.has(code)) state.enabled.delete(code);
            else state.enabled.add(code);
            buildBookPills();
            renderChart();  // no refetch — server returned all books, we filter client-side
        }

        async function authFetchSafe(url) {
            const u = firebase.auth().currentUser;
            if (!u) return null;
            const tok = await u.getIdToken();
            return fetch(url, { headers: { Authorization: 'Bearer ' + tok } });
        }

        async function fetchAndRender() {
            const seq = ++state.inflight;
            const params = new URLSearchParams({
                sport: state.sport || '',
                home: state.home,
                away: state.away,
                commence: state.commence,
                market: state.market,
                since: state.span,
            });
            try {
                const resp = await authFetchSafe('/api/odds/history?' + params.toString());
                if (!resp || !resp.ok) { state.data = null; renderChart(); return; }
                const j = await resp.json();
                if (seq !== state.inflight) return; // stale
                state.data = j;
            } catch (e) {
                state.data = null;
            }
            renderChart();
        }

        function renderChart() {
            const canvas = document.getElementById('chartCanvas');
            const empty  = document.getElementById('chartEmpty');
            const meta   = document.getElementById('chartHdrMeta');

            if (state.chart) { state.chart.destroy(); state.chart = null; }

            const data = state.data;
            const haveAny = data && data.books && Object.keys(data.books).length > 0;
            if (!haveAny) {
                canvas.style.display = 'none';
                empty.style.display  = '';
                meta.textContent = '';
                return;
            }
            canvas.style.display = '';
            empty.style.display  = 'none';

            // Only plot the currently selected side. Showing both sides at
            // once forces the Y-axis to span both ML legs (e.g. -150 to +130),
            // which squashes any actual movement into a flat line.
            const side = state.side;

            const datasets = [];
            for (const b of CHART_BOOKS) {
                if (!state.enabled.has(b.code)) continue;
                const byBook = (data.books || {})[b.code];
                if (!byBook) continue;
                const arr = byBook[side];
                if (!arr || !arr.length) continue;
                // Convert ISO strings to Unix ms so Chart.js's time scale
                // doesn't have to guess timezone parsing.
                // Y is implied probability, NOT raw American odds. American
                // has a 200-cent discontinuity at ±100 (both = 50%) so plotting
                // it linearly draws huge fake cliffs every favorite/dog flip.
                // Probability is continuous — the tick callback labels each
                // tick back in American so the user still reads odds, not %.
                // The original American price is kept in `_american` for the
                // tooltip.
                const points = arr
                    .map(p => ({
                        x: new Date(p.ts).valueOf(),
                        y: americanToProb(p.price),
                        _american: p.price,
                        _line: p.line,
                    }))
                    .filter(p => Number.isFinite(p.x) && Number.isFinite(p.y));
                const last = points[points.length - 1];
                if (last) points.push({ x: Date.now(), y: last.y, _american: last._american, _line: last._line });
                datasets.push({
                    label: b.label,  // side is already shown in the SIDE pill row
                    data: points,
                    borderColor: b.color,
                    backgroundColor: b.color + '33',
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    borderWidth: 2,
                    // Step interpolation — books post a line and sit, then
                    // jump. A tensioned curve would lie about gradual drift
                    // that never happened.
                    stepped: 'after',
                    tension: 0,
                });
            }

            if (!datasets.length) {
                canvas.style.display = 'none';
                empty.style.display  = '';
                empty.textContent = 'No data for the selected books / range. Try toggling more books or expanding the range.';
                return;
            }

            // Header meta: market + side label + sample count
            const totalPoints = datasets.reduce((n, d) => n + d.data.length - 1, 0);
            const mktLabel = data.market === 'moneyline' ? 'Moneyline'
                          : data.market === 'spread' ? 'Spread'
                          : 'Total';
            meta.textContent = `${mktLabel} · ${sideLabel(state.market, side)} · ${totalPoints} samples`;

            const ctx = canvas.getContext('2d');
            state.chart = new Chart(ctx, {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'nearest', intersect: false },
                    // Chart.js needs default parsing enabled so the time
                    // scale can handle our ISO-string x values.
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#cbd5e1', boxWidth: 12, boxHeight: 2,
                                font: { family: 'JetBrains Mono, monospace', size: 11 },
                            },
                        },
                        tooltip: {
                            backgroundColor: '#13171e',
                            borderColor: '#1e2530', borderWidth: 1,
                            titleFont: { family: 'DM Sans, sans-serif', size: 12 },
                            bodyFont: { family: 'JetBrains Mono, monospace', size: 11 },
                            callbacks: {
                                title: items => {
                                    const d = new Date(items[0].parsed.x);
                                    return d.toLocaleString('en-US', {
                                        month: 'short', day: 'numeric',
                                        hour: 'numeric', minute: '2-digit',
                                    });
                                },
                                label: item => {
                                    const ds = item.dataset;
                                    const p  = item.raw;
                                    const american = fmtAmerican(p._american);
                                    const line = p._line != null ? ' @ ' + p._line : '';
                                    return ds.label + ': ' + american + line;
                                },
                            },
                        },
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: { tooltipFormat: 'MMM d, h:mm a' },
                            grid: { color: 'rgba(255,255,255,0.04)' },
                            ticks: { color: '#8890a8', font: { family: 'JetBrains Mono, monospace', size: 10 } },
                        },
                        y: {
                            // Y values are implied probability (0-1). Tick
                            // labels re-derive American odds so the user sees
                            // familiar +/- numbers and never a "0" tick.
                            grid: { color: 'rgba(255,255,255,0.04)' },
                            ticks: {
                                color: '#8890a8',
                                font: { family: 'JetBrains Mono, monospace', size: 10 },
                                callback: v => fmtAmerican(probToAmerican(v)),
                                // Avoid Chart.js trying to find a "0" tick or
                                // generating evenly-spaced probability ticks
                                // that map to weird American values.
                                maxTicksLimit: 6,
                            },
                        },
                    },
                },
            });
        }

        window.openChartModal = function(opts) {
            state.sport    = opts.sport;
            state.home     = opts.home;
            state.away     = opts.away;
            state.commence = opts.commence;
            state.market   = 'ml';
            state.side     = defaultSide('ml');
            state.span     = '12h';
            state.enabled  = new Set(CHART_BOOKS.filter(b=>b.defaultOn).map(b=>b.code));
            document.getElementById('chartHdrTitle').textContent = opts.away + ' @ ' + opts.home;
            setActivePill('chartMarketRow', 'market', 'ml');
            setActivePill('chartSpanRow', 'span', '12h');
            buildSidePills();
            buildBookPills();
            document.getElementById('chartModalBg').classList.add('open');
            fetchAndRender();
        };

        window.closeChartModal = function() {
            document.getElementById('chartModalBg').classList.remove('open');
            if (state.chart) { state.chart.destroy(); state.chart = null; }
            state.data = null;
        };

        // Close on Esc
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && document.getElementById('chartModalBg').classList.contains('open')) {
                window.closeChartModal();
            }
        });

        // Delegated click handler for the per-game chart icons. The Odds Board
        // re-renders the game list frequently — using delegation keeps a single
        // listener regardless of how many times innerHTML gets swapped.
        document.addEventListener('click', e => {
            const btn = e.target.closest('.js-chart-btn');
            if (!btn) return;
            window.openChartModal({
                sport:    btn.dataset.sport,
                home:     btn.dataset.home,
                away:     btn.dataset.away,
                commence: btn.dataset.commence,
            });
        });
    })();
    </script>
</body>
</html>
